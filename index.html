function balanceThresholdAdjustmentV9EBalance(move, state, afterHand) {
    // 極窄的計分保護：只處理 9 張以上倍扣臨界點。
    // 不看老 2，不做全局避險，避免重演 v9F/v9G 的過度保守。
    if (!afterHand || !state) return 0;
    if (state.hand.length < 9) return 0;
    if ((state.lowestOpponentCards || 13) > 3) return 0;
    if (afterHand.length <= 8) return 0;

    const stillOver = afterHand.length - 8;
    let penalty = 105 + stillOver * 24;

    // 出單張時通常代表沒有有效降到倍扣線以下，稍微再扣，但仍保持輕量。
    if (move && move.pattern && move.pattern.type === 'single') penalty += 28;

    // 如果已經嚴重落後，補一點；仍限制上限，避免推翻 partition 主體。
    if ((state.lag || 0) >= 7) penalty += 35;
    return -clamp(penalty, 90, 190);
}



function chooseAIActionV10HybridRollout(legalMoves, state) {
    // v10-Hybrid-Rollout：以 v9E-EndSolver 為主體；只在關鍵局面抽樣未知牌做 rollout 重估。
    // Rollout 不直接讀對手真手牌，只用：自己手牌、已出牌、桌面、各家剩牌數，將未知牌隨機分配給對手。
    const base = chooseAIActionV9EEndSolver(legalMoves, state);
    if (!base || !base.move) return base;

    const trigger = shouldUseHybridRolloutV10(legalMoves, state, base);
    if (!trigger.use) {
        if (base.move && base.move.pattern) base.move.pattern.aiMode = (base.move.pattern.aiMode || 'endSolver') + '+v10NoRollout';
        return base;
    }

    const candidates = getRolloutCandidatesV10(legalMoves, base.move, trigger.candidateLimit || 8);
    if (candidates.length <= 1) return base;

    let best = base.move;
    let bestScore = -Infinity;
    const rows = [];

    for (const move of candidates) {
        const rollout = evaluateCandidateByHiddenRolloutV10(move, state, trigger.samples || 10, trigger.maxSteps || 90);
        const afterHand = state.hand.filter(c => !move.cards.includes(c));
        const planMoves = estimateMoveCountLite(afterHand);
        const baseScore = Number.isFinite(move.aiScore) ? move.aiScore : 0;
        let composite = baseScore;

        // 期望分是 Big Two 計分制下的直接目標；但只作 hybrid 重估，不完全覆蓋主體評分。
        composite += rollout.avgScore * 42;
        composite += rollout.winRate * 560;
        composite -= rollout.badLossRate * 720;
        composite -= rollout.oneCardLossRate * 170;
        composite -= rollout.avgMyRemain * 34;
        composite += Math.max(0, 5 - rollout.avgMinOppRemain) * -18;

        // 保留 EndSolver 的尾局精算優勢：短收官候選可吃到 rollout 放大。
        if (afterHand.length === 0) composite += 100000;
        else if (afterHand.length <= 5) {
            const exact = exactEndgamePlanV9E(afterHand, state);
            if (exact && exact.moves <= 1) composite += 340;
            else if (exact && exact.moves === 2) composite += 160;
            if (countWeakSinglesV8C(afterHand) >= 2 && rollout.winRate < 0.35) composite -= 160;
        }
        if (planMoves <= 2 && rollout.winRate >= 0.42) composite += 150;
        if (state.lowestOpponentCards <= 2 && rollout.winRate < 0.25 && afterHand.length >= 3) composite -= 220;

        move.v10RolloutScore = composite;
        move.v10RolloutAvgScore = rollout.avgScore;
        move.v10RolloutWinRate = rollout.winRate;
        move.v10RolloutBadLossRate = rollout.badLossRate;
        rows.push({ move, rollout, composite });

        if (composite > bestScore) {
            bestScore = composite;
            best = move;
        }
    }

    // 安全閥：rollout 只在有明顯證據時推翻 EndSolver，避免因抽樣雜訊亂跳。
    const baseRow = rows.find(r => sameMoveCardsV10(r.move, base.move));
    const bestRow = rows.find(r => sameMoveCardsV10(r.move, best));
    const baseComposite = baseRow ? baseRow.composite : (Number.isFinite(base.score) ? base.score : (base.move.aiScore || 0));
    const margin = bestScore - baseComposite;
    const baseWinRate = baseRow ? baseRow.rollout.winRate : 0;
    const bestWinRate = bestRow ? bestRow.rollout.winRate : 0;
    const baseAvgScore = baseRow ? baseRow.rollout.avgScore : 0;
    const bestAvgScore = bestRow ? bestRow.rollout.avgScore : 0;

    let allowOverride = best === base.move;
    if (!allowOverride) {
        if (margin >= 145 && bestAvgScore >= baseAvgScore - 1.5) allowOverride = true;
        if (bestWinRate >= baseWinRate + 0.18 && margin >= 70) allowOverride = true;
        if (bestRow && baseRow && bestRow.rollout.badLossRate + 0.20 < baseRow.rollout.badLossRate && margin >= 40) allowOverride = true;
    }
    if (!allowOverride) {
        best = base.move;
        bestScore = Number.isFinite(base.score) ? base.score : (base.move.aiScore || 0);
    }

    if (best) {
        best.aiScore = bestScore;
        best.pattern.aiScore = bestScore;
        best.pattern.aiMode = (best.pattern.aiMode || 'partition+finalTie+endSolver') + '+rollout';
        const row = rows.find(r => sameMoveCardsV10(r.move, best));
        if (row) {
            best.pattern.rolloutAvg = Math.round(row.rollout.avgScore * 10) / 10;
            best.pattern.rolloutWin = Math.round(row.rollout.winRate * 100);
            best.pattern.rolloutBad = Math.round(row.rollout.badLossRate * 100);
        }
    }

    return { move: best, score: bestScore, mode: 'v10-hybrid-rollout' };
}

function shouldUseHybridRolloutV10(legalMoves, state, base) {
    const urgent = state.anyOpponentLastCard || state.anyOpponentTwoCards || state.lowestOpponentCards <= 4 || state.lag >= 4;
    const endgame = state.hand.length <= 8;
    const followingKey = state.isFollowing && (state.lowestOpponentCards <= 5 || state.hand.length <= 9);
    const baseAfter = base && base.move ? state.hand.filter(c => !base.move.cards.includes(c)) : state.hand;
    const shortAfter = baseAfter.length <= 6 || estimateMoveCountLite(baseAfter) <= 3;
    const closeCandidates = countCloseCandidatesV10(legalMoves, base && base.move ? base.move.aiScore : -Infinity, 210) >= 2;
    const use = (state.hand.length <= 6) || (state.lowestOpponentCards <= 3) || state.anyOpponentLastCard ||
        (state.isFollowing && state.hand.length <= 8 && state.lowestOpponentCards <= 5) ||
        (shortAfter && state.hand.length <= 9) || (closeCandidates && state.hand.length <= 8);
    let samples = 3;
    let maxSteps = 50;
    let candidateLimit = 4;
    if (state.hand.length <= 6 || state.lowestOpponentCards <= 3) { samples = 5; maxSteps = 58; candidateLimit = 5; }
    if (state.hand.length <= 4 || state.lowestOpponentCards <= 2) { samples = 7; maxSteps = 66; candidateLimit = 6; }
    if (!testMode && state.hand.length > 7 && state.lowestOpponentCards > 3) { samples = 2; candidateLimit = 4; }
    return { use, samples, maxSteps, candidateLimit };
}

function countCloseCandidatesV10(legalMoves, bestScore, gap) {
    if (!Number.isFinite(bestScore)) return 0;
    return legalMoves.filter(m => Number.isFinite(m.aiScore) && bestScore - m.aiScore <= gap).length;
}

function getRolloutCandidatesV10(legalMoves, baseMove, limit) {
    const seen = new Set();
    const out = [];
    function add(m) {
        if (!m) return;
        const key = m.cards.map(c => c.value).sort((a,b)=>a-b).join('-');
        if (seen.has(key)) return;
        seen.add(key);
        out.push(m);
    }
    add(baseMove);
    [...legalMoves]
        .filter(m => Number.isFinite(m.aiScore))
        .sort((a,b) => b.aiScore - a.aiScore)
        .slice(0, Math.max(limit, 4) + 4)
        .forEach(add);
    return out.slice(0, limit);
}

function evaluateCandidateByHiddenRolloutV10(candidateMove, state, samples, maxSteps) {
    let scoreSum = 0;
    let winCount = 0;
    let badLossCount = 0;
    let oneCardLossCount = 0;
    let myRemainSum = 0;
    let minOppRemainSum = 0;

    for (let i = 0; i < samples; i++) {
        const seedLabel = `v10|deck:${currentDeckSeed}|turn:${testTurnNo}|p:${state.playerIdx}|m:${candidateMove.cards.map(c=>c.value).join(',')}|s:${i}`;
        const rng = mulberry32(deriveSeed(testBaseSeed || hashSeedString('v10-live'), seedLabel));
        const result = rolloutHiddenSampleV10(candidateMove, state, maxSteps, rng);
        scoreSum += result.scoreDelta;
        if (result.winner === state.playerIdx) winCount++;
        if (result.winner !== state.playerIdx && result.myRemain >= 8) badLossCount++;
        if (result.winner !== state.playerIdx && result.myRemain === 1) oneCardLossCount++;
        myRemainSum += result.myRemain;
        minOppRemainSum += result.minOppRemain;
    }

    return {
        avgScore: scoreSum / samples,
        winRate: winCount / samples,
        badLossRate: badLossCount / samples,
        oneCardLossRate: oneCardLossCount / samples,
        avgMyRemain: myRemainSum / samples,
        avgMinOppRemain: minOppRemainSum / samples
    };
}

function rolloutHiddenSampleV10(candidateMove, state, maxSteps, rng) {
    const me = state.playerIdx;
    const hands = dealHiddenHandsForRolloutV10(state, rng);
    let table = lastPlayedCards ? { ...lastPlayedCards } : null;
    let first = isFirstRound;
    let passN = passCount;
    let cur = me;

    function applyMoveLocal(playerIdx, move) {
        const vals = new Set(move.cards.map(c => c.value));
        hands[playerIdx] = hands[playerIdx].filter(c => !vals.has(c.value));
        table = { ...move.pattern, owner: playerIdx };
        passN = 0;
        first = false;
    }

    applyMoveLocal(me, candidateMove);
    if (hands[me].length === 0) return buildRolloutResultV10(hands, me, me);
    cur = (me + 1) % numPlayers;

    for (let step = 0; step < maxSteps; step++) {
        const legal = generateRolloutLegalMovesV10(hands[cur], table, first, startCardValue);
        let move = null;
        if (legal.length > 0) move = chooseRolloutMoveV10(legal, hands, cur, table, first, rng);

        if (move) {
            applyMoveLocal(cur, move);
            if (hands[cur].length === 0) return buildRolloutResultV10(hands, me, cur);
        } else {
            if (table && !first) {
                passN += 1;
                if (passN >= numPlayers - 1) {
                    table = null;
                    passN = 0;
                }
            } else {
                passN += 1;
            }
        }
        cur = (cur + 1) % numPlayers;
    }
    return buildRolloutResultV10(hands, me, -1);
}

function dealHiddenHandsForRolloutV10(state, rng) {
    const hands = Array.from({ length: numPlayers }, () => []);
    hands[state.playerIdx] = [...state.hand];
    const known = new Set(state.hand.map(c => c.value));
    playedValues.forEach(v => known.add(v));

    const unknown = [];
    for (const r of RANKS) {
        for (let s = 0; s < 4; s++) {
            const c = new Card(r, s);
            if (!known.has(c.value)) unknown.push(c);
        }
    }
    shuffle(unknown, rng);

    let ptr = 0;
    for (let i = 0; i < numPlayers; i++) {
        if (i === state.playerIdx) continue;
        const need = players[i] ? players[i].hand.length : 0;
        hands[i] = unknown.slice(ptr, ptr + need).sort((a,b)=>a.value-b.value);
        ptr += need;
    }
    return hands;
}


function generateRolloutLegalMovesV10(hand, tablePattern, firstRound, requiredCardValue) {
    // Rollout 內部用的快速合法出牌生成。避免每一步都枚舉大量五張組合，否則 2000 局測試會太慢。
    const sorted = [...hand].sort((a, b) => a.value - b.value);
    const moves = [];
    const groups = groupByRank(sorted);

    for (const c of sorted) moves.push({ cards: [c], pattern: analyzePattern([c]) });
    for (const group of groups.values()) {
        if (group.length >= 2) for (const pair of combinations(group, 2)) moves.push({ cards: pair, pattern: analyzePattern(pair) });
        if (group.length >= 3) for (const triple of combinations(group, 3)) moves.push({ cards: triple, pattern: analyzePattern(triple) });
    }

    const needFive = (tablePattern && tablePattern.len === 5) || (!tablePattern && hand.length <= 8) || firstRound;
    if (needFive && sorted.length >= 5) {
        const fiveMoves = generateFiveCardMoves(sorted)
            .sort((a, b) => {
                if ((b.pattern.comboRank || 0) !== (a.pattern.comboRank || 0)) return (b.pattern.comboRank || 0) - (a.pattern.comboRank || 0);
                return b.pattern.val - a.pattern.val;
            })
            .slice(0, hand.length > 9 ? 18 : 36);
        moves.push(...fiveMoves);
    }

    return dedupeMoves(moves).filter(move => {
        if (!move.pattern) return false;
        if (firstRound && !move.cards.some(c => c.value === requiredCardValue)) return false;
        if (!tablePattern) return true;
        return canBeat(move.pattern, tablePattern);
    }).sort((a, b) => {
        if (a.cards.length !== b.cards.length) return b.cards.length - a.cards.length;
        if ((a.pattern.comboRank || 0) !== (b.pattern.comboRank || 0)) return (b.pattern.comboRank || 0) - (a.pattern.comboRank || 0);
        return a.pattern.val - b.pattern.val;
    });
}

function chooseRolloutMoveV10(legal, hands, cur, table, first, rng) {
    let best = null;
    let bestScore = -Infinity;
    const hand = hands[cur];
    const beforePlan = estimateMoveCountLite(hand);
    const oppCounts = hands.map(h => h.length).filter((_, idx) => idx !== cur);
    const lowestOpp = Math.min(...oppCounts);
    const urgent = lowestOpp <= 2 || hand.length <= 4;

    for (const m of legal) {
        const vals = new Set(m.cards.map(c => c.value));
        const after = hand.filter(c => !vals.has(c.value));
        if (after.length === 0) return m;
        const pat = m.pattern;
        const rank = Math.floor(pat.val / 4);
        const afterPlan = estimateMoveCountLite(after);
        let score = 0;
        score += (beforePlan - afterPlan) * 180;
        score += m.cards.length * 35;
        score -= getStrengthCost(pat) * 0.48;
        score += evaluateHandShapeFast(after) * 0.06;
        if (after.length <= 5 && canBeOneMove(after)) score += 560;
        if (after.length <= 6 && canFinishInTwoMoves(after)) score += 310;
        if (after.length <= 3) score += 120;

        if (!table) {
            if (pat.type === 'single' && rank <= VALUES['8']) score += 45;
            if (pat.type === 'pair' && rank <= VALUES['10']) score += 55;
            if (pat.type === 'single' && rank >= VALUES['K'] && after.length > 2 && !urgent) score -= 120;
            if (pat.len === 5 && afterPlan <= 2) score += 140;
        } else {
            if (pat.type === 'single' && lowestOpp <= 1) score += 90;
            if (pat.type === 'pair' && lowestOpp <= 2) score += 90;
        }

        const twosUsed = m.cards.filter(c => c.rank === '2').length;
        if (twosUsed && after.length > 4 && !urgent) score -= 130 * twosUsed;
        if (countWeakSinglesV8C(after) >= 2 && after.length <= 5) score -= 120;
        score += (rng() - 0.5) * 6;
        if (score > bestScore) { bestScore = score; best = m; }
    }

    // 模擬中的 Pass 門檻：跟牌太虧就 Pass，但有人快出完時降低 Pass 意願。
    if (table && !first) {
        const threshold = urgent ? -95 : -25;
        if (bestScore < threshold) return null;
    }
    return best;
}

function buildRolloutResultV10(hands, me, winner) {
    const myRemain = hands[me].length;
    const minOppRemain = Math.min(...hands.filter((_,i)=>i!==me).map(h=>h.length));
    let scoreDelta = 0;
    if (winner === me) {
        for (let i = 0; i < numPlayers; i++) if (i !== me) scoreDelta += calculatePenaltyForHand(hands[i]);
    } else if (winner >= 0) {
        scoreDelta = -calculatePenaltyForHand(hands[me]);
    } else {
        // 未在步數內結束時，用剩牌風險近似。
        scoreDelta = -calculatePenaltyForHand(hands[me]) * 0.35 + (13 - minOppRemain) * -0.4;
    }
    return { winner, myRemain, minOppRemain, scoreDelta };
}

function sameMoveCardsV10(a, b) {
    if (!a || !b || !a.cards || !b.cards || a.cards.length !== b.cards.length) return false;
    const av = a.cards.map(c => c.value).sort((x,y)=>x-y).join('-');
    const bv = b.cards.map(c => c.value).sort((x,y)=>x-y).join('-');
    return av === bv;
}

function chooseAIActionV9EEndSolver(legalMoves, state) {
    // v9E-EndSolver：以 v9E 原版為底，只在尾局（自己或出完後剩 5 張以下）加入 exact endgame solver。
    // 介入方式維持 tie-breaker：只有 partition 分數接近時才有影響，避免重演 Pressure / Balance 的全局副作用。
    const base = chooseAIActionV8E(legalMoves, state);
    if (!base || !base.move) return base;

    const analyzer = makePartitionAnalyzerV9C(state.hand);
    const beforePart = analyzer.solveCards(state.hand);
    const beforeExposure = estimateRemainingPointExposureV9C(state.hand);

    const seen = new Set();
    const candidates = [];
    const sorted = [...legalMoves]
        .filter(m => Number.isFinite(m.aiScore))
        .sort((a, b) => b.aiScore - a.aiScore)
        .slice(0, 26);
    sorted.unshift(base.move);

    for (const m of sorted) {
        const key = m.cards.map(c => c.value).sort((a, b) => a - b).join('-');
        if (seen.has(key)) continue;
        seen.add(key);
        candidates.push(m);
    }

    const rows = [];
    let bestPartitionScore = -Infinity;

    for (const move of candidates) {
        const afterHand = state.hand.filter(c => !move.cards.includes(c));
        const afterPart = analyzer.solveCards(afterHand);
        const partAdj = partitionMoveAdjustmentV9C(move, state, analyzer, beforePart, afterPart, beforeExposure, afterHand);
        const baseScore = Number.isFinite(move.aiScore) ? move.aiScore : 0;
        const partitionComposite = baseScore + partAdj;
        bestPartitionScore = Math.max(bestPartitionScore, partitionComposite);
        rows.push({ move, afterHand, afterPart, partAdj, baseScore, partitionComposite });
    }

    let best = base.move;
    let bestScore = Number.isFinite(base.score) ? base.score : (base.move.aiScore || 0);
    let bestPart = null;

    for (const row of rows) {
        const { move, afterHand, afterPart, partAdj, partitionComposite } = row;
        const finalRaw = finalHandControlAdjustmentV9D(move, state, analyzer, afterPart, afterHand);
        const endRaw = endSolverAdjustmentV9E(move, state, afterHand, afterPart);
        const gap = bestPartitionScore - partitionComposite;
        let finalAdj = 0;
        let endAdj = 0;

        if (gap <= 180) {
            finalAdj = clamp(finalRaw * 0.34, -210, 210);
        } else if (gap <= 360) {
            finalAdj = clamp(finalRaw * 0.16, -80, 80);
        } else if (gap <= 520) {
            finalAdj = clamp(finalRaw * 0.06, -35, 35);
        }

        // EndSolver 更窄：只在尾局，而且只在 partition 差距小時介入。
        // 這裏刻意比 finalTie 更弱，目標是修低孤張尾局，不是重排全局策略。
        const isEndgame = state.hand.length <= 5 || afterHand.length <= 5;
        if (isEndgame) {
            if (gap <= 150) endAdj = clamp(endRaw * 0.26, -180, 180);
            else if (gap <= 280) endAdj = clamp(endRaw * 0.10, -70, 70);
            else if (gap <= 420) endAdj = clamp(endRaw * 0.04, -25, 25);
        }

        const composite = partitionComposite + finalAdj + endAdj;
        move.v9cPartitionScore = partAdj;
        move.v9eFinalTieScore = finalAdj;
        move.v9eFinalRawScore = finalRaw;
        move.v9eEndSolverScore = endAdj;
        move.v9eEndSolverRawScore = endRaw;
        move.v9cPartitionMoves = 1 + afterPart.moves;

        if (composite > bestScore) {
            bestScore = composite;
            best = move;
            bestPart = afterPart;
        }
    }

    if (best) {
        best.aiScore = bestScore;
        best.pattern.aiScore = bestScore;
        best.pattern.aiMode = best.pattern.aiMode || 'partition+finalTie+endSolver';
        best.pattern.partitionPlan = best.v9cPartitionMoves;
        best.pattern.partitionAdj = Math.round(best.v9cPartitionScore || 0);
        best.pattern.finalTieAdj = Math.round(best.v9eFinalTieScore || 0);
        best.pattern.finalControlRaw = Math.round(best.v9eFinalRawScore || 0);
        best.pattern.endSolverAdj = Math.round(best.v9eEndSolverScore || 0);
        best.pattern.endSolverRaw = Math.round(best.v9eEndSolverRawScore || 0);
    }

    return { move: best, score: best ? best.aiScore : bestScore, mode: 'partition+finalTie+endSolver', partition: bestPart };
}

function endSolverAdjustmentV9E(move, state, afterHand, afterPart) {
    if (!afterHand || afterHand.length === 0) return 0;
    if (state.hand.length > 5 && afterHand.length > 5) return 0;

    const plan = exactEndgamePlanV9E(afterHand, state);
    if (!plan) return 0;

    const currentMoveSafe = !canAnyOpponentBeatPatternV9D(move.pattern, state);
    const lowestOpp = state.lowestOpponentCards || 13;
    const weakAfter = countWeakSinglesV8C(afterHand);
    const controlsAfter = countControlCards(afterHand);
    const oneMove = findOneMoveForWholeHandV9D(afterHand);

    let score = 0;

    // 核心：剩牌若可在 1–2 手內清，而且最後一手安全，才給加分。
    if (plan.moves <= 1) score += 620;
    else if (plan.moves === 2) score += 260;
    else if (plan.moves >= 4 && afterHand.length <= 5) score -= 160;

    score += plan.safety;

    // 低孤張尾局是 v9E 最常見的差一手輸來源。
    if (weakAfter >= 2 && afterHand.length <= 4) score -= 180 * weakAfter;
    if (controlsAfter === 0 && weakAfter >= 1 && afterHand.length <= 4) score -= 160;

    // 牌權能不能保住很關鍵；但只在尾局給小幅修正。
    if (currentMoveSafe && plan.moves <= 2) score += 180;
    if (!currentMoveSafe && plan.moves <= 2 && lowestOpp <= 3) score -= 210;

    // 如果對手剩 1 張，避免把尾局導向低單張戰，除非自己最後單張夠大。
    if (lowestOpp <= 1) {
        if (plan.lastType === 'single') {
            if (plan.lastRank <= VALUES['J']) score -= 260;
            else if (plan.lastRank >= VALUES['A']) score += 100;
        } else {
            score += 90; // 非單張路線可暫時鎖住對手一張收官。
        }
    }

    // 如果對手剩 2 張，保留 pair 或五張牌型通常比散單張好。
    if (lowestOpp <= 2) {
        if (plan.hasPairEnd) score += 120;
        if (plan.singleCount >= 2 && controlsAfter === 0) score -= 180;
    }

    // v9E 已有 finalTie；EndSolver 不應重複過度獎勵一手牌，但可修正低單張。
    if (oneMove && oneMove.pattern && oneMove.pattern.type === 'single') {
        const c = oneMove.cards[0];
        if (c.rankVal <= VALUES['9']) score -= 260;
        else if (c.rankVal >= VALUES['A']) score += 180;
    }

    return score;
}

function exactEndgamePlanV9E(hand, state) {
    if (!hand || hand.length === 0) return { moves: 0, safety: 0, lastType: 'none', lastRank: 99, hasPairEnd: false, singleCount: 0 };
    if (hand.length > 5) return null;

    const cards = [...hand].sort((a, b) => a.value - b.value);
    const indexByValue = new Map(cards.map((c, i) => [c.value, i]));
    const fullMask = (1 << cards.length) - 1;
    const rawMoves = generateAllMoves(cards)
        .map(m => ({ move: m, mask: maskOfCardsEndSolverV9E(m.cards, indexByValue) }))
        .filter(x => x.mask !== 0);

    const memo = new Map();
    function solve(mask) {
        if (mask === 0) return [{ moves: [], score: 0 }];
        if (memo.has(mask)) return memo.get(mask);
        const out = [];
        for (const item of rawMoves) {
            if ((item.mask & mask) !== item.mask) continue;
            const children = solve(mask ^ item.mask);
            for (const child of children) {
                const stepScore = endSolverStepScoreV9E(item.move, state, child.moves.length === 0);
                out.push({ moves: [item.move, ...child.moves], score: stepScore + child.score });
            }
        }
        out.sort((a, b) => {
            if (a.moves.length !== b.moves.length) return a.moves.length - b.moves.length;
            return b.score - a.score;
        });
        const trimmed = out.slice(0, 16);
        memo.set(mask, trimmed);
        return trimmed;
    }

    const plans = solve(fullMask);
    if (!plans.length) return null;

    let best = null;
    for (const p of plans) {
        const last = p.moves[p.moves.length - 1];
        const lastInfo = endSolverLastMoveInfoV9E(last);
        const shapePenalty = endSolverShapePenaltyV9E(p.moves);
        const score = p.score - p.moves.length * 260 + lastInfo.safety + shapePenalty;
        const candidate = { route: p.moves, score, lastInfo };
        if (!best || candidate.score > best.score) best = candidate;
    }
    if (!best) return null;

    const singles = best.route.filter(m => m.pattern && m.pattern.type === 'single').length;
    const hasPairEnd = best.route.some(m => m.pattern && m.pattern.type === 'pair');
    return {
        moves: best.route.length,
        safety: best.score,
        lastType: best.lastInfo.type,
        lastRank: best.lastInfo.rank,
        hasPairEnd,
        singleCount: singles
    };
}

function endSolverStepScoreV9E(move, state, isLastStep) {
    if (!move || !move.pattern) return -500;
    const p = move.pattern;
    let score = 0;
    if (p.len === 5) score += 180 + (p.comboRank || 0) * 40;
    if (p.type === 'pair') {
        const r = Math.floor(p.val / 4);
        score += r >= VALUES['Q'] ? 150 : (r <= VALUES['8'] ? -80 : 30);
    }
    if (p.type === 'triple') score += 80;
    if (p.type === 'single') {
        const c = move.cards[0];
        if (c.rankVal <= VALUES['8']) score -= isLastStep ? 520 : 220;
        else if (c.rankVal <= VALUES['J']) score -= isLastStep ? 260 : 80;
        else if (c.rankVal === VALUES['K']) score += 40;
        else if (c.rankVal === VALUES['A']) score += 180;
        else if (c.rank === '2') score += 420;
    }
    return score;
}

function endSolverLastMoveInfoV9E(move) {
    if (!move || !move.pattern) return { type: 'none', rank: -1, safety: 0 };
    const p = move.pattern;
    if (p.type === 'single') {
        const c = move.cards[0];
        let safety = 0;
        if (c.rankVal <= VALUES['8']) safety -= 650;
        else if (c.rankVal <= VALUES['J']) safety -= 310;
        else if (c.rankVal === VALUES['Q']) safety -= 120;
        else if (c.rankVal === VALUES['K']) safety += 40;
        else if (c.rankVal === VALUES['A']) safety += 240;
        else if (c.rank === '2') safety += 620;
        return { type: 'single', rank: c.rankVal, safety };
    }
    if (p.type === 'pair') {
        const r = Math.floor(p.val / 4);
        let safety = r >= VALUES['A'] ? 380 : (r >= VALUES['Q'] ? 180 : (r <= VALUES['8'] ? -160 : 40));
        return { type: 'pair', rank: r, safety };
    }
    if (p.len === 5) return { type: 'five', rank: p.val || 0, safety: 260 + (p.comboRank || 0) * 45 };
    if (p.type === 'triple') return { type: 'triple', rank: Math.floor(p.val / 4), safety: 90 };
    return { type: p.type || 'other', rank: Math.floor((p.val || 0) / 4), safety: 0 };
}

function endSolverShapePenaltyV9E(route) {
    let lowSingles = 0;
    let singles = 0;
    for (const m of route) {
        if (!m.pattern || m.pattern.type !== 'single') continue;
        singles++;
        const c = m.cards[0];
        if (c.rankVal <= VALUES['9']) lowSingles++;
    }
    let score = 0;
    if (singles >= 3) score -= 180;
    if (lowSingles >= 2) score -= 260;
    if (lowSingles >= 3) score -= 300;
    return score;
}

function maskOfCardsEndSolverV9E(cards, indexByValue) {
    let mask = 0;
    for (const c of cards) {
        const idx = indexByValue.get(c.value);
        if (idx !== undefined) mask |= (1 << idx);
    }
    return mask;
}

function finalHandControlAdjustmentV9D(move, state, analyzer, afterPart, afterHand) {
    if (!afterHand || afterHand.length === 0 || !afterPart) return 0;

    const currentMoveSafe = !canAnyOpponentBeatPatternV9D(move.pattern, state);
    const controlsAfter = countControlCards(afterHand);
    const weakAfter = countWeakSinglesV8C(afterHand);
    const oneMove = findOneMoveForWholeHandV9D(afterHand);
    const lowestOpp = state.lowestOpponentCards || 13;
    let score = 0;

    // 如果這手出完後，牌權大概率會回來，短收官路線較可信。
    if (currentMoveSafe && afterPart.moves <= 2) score += 190;
    if (!currentMoveSafe && afterPart.moves <= 2 && lowestOpp <= 3) score -= 180;

    // 剩一手可走時，判斷那一手是否安全；尤其避免「最後剩低單張」。
    if (oneMove) {
        const p = oneMove.pattern;
        const len = oneMove.cards.length;
        const beaters = canAnyOpponentBeatPatternV9D(p, state) ? countOpponentBeatersForPatternV9D(p, state) : 0;

        if (len === 1) {
            const last = oneMove.cards[0];
            const risk = lastSingleRiskInfoV8E(last, state);
            if (isLowSingleCardV8C(last)) {
                score -= 640 + risk.beaters * 150;
                if (!currentMoveSafe) score -= 170;
            } else if (last.rankVal <= VALUES['J']) {
                score -= 260 + risk.beaters * 80;
            } else if (last.rankVal <= VALUES['K']) {
                score -= 90 + risk.beaters * 45;
            } else {
                score += 90;
            }
            if (risk.safe) score += 420;
            if (currentMoveSafe && risk.safe) score += 180;
            if (lowestOpp <= 2 && !risk.safe) score -= 200;
        } else if (len === 2 && p.type === 'pair') {
            if (beaters === 0) score += 360;
            else {
                const pairRank = Math.floor(p.val / 4);
                if (pairRank <= VALUES['9']) score -= 180;
                if (lowestOpp <= 2) score -= 160;
            }
        } else if (len === 5) {
            if (beaters === 0) score += 260;
            else if (lowestOpp <= 5) score -= 100;
        } else {
            score += 160;
        }
    }

    // 兩手路線：若其中包含低孤張且沒有控制牌，通常就是「差一手輸」來源。
    if (afterPart.moves === 2) {
        if (weakAfter === 0) score += 260;
        else {
            score -= Math.min(420, weakAfter * 170);
            if (controlsAfter === 0) score -= 180;
            if (!currentMoveSafe) score -= 120;
        }
        if (controlsAfter >= 1) score += 130;
    }

    // 三手以上不要過度干預，否則會重演 v8C/v8F 的副作用；只做輕量風險修正。
    if (afterPart.moves >= 3) {
        if (weakAfter >= 3 && state.hand.length <= 8) score -= 120;
        if (controlsAfter === 0 && weakAfter >= 2 && state.hand.length <= 8) score -= 110;
    }

    // 計分制下，避免出完這手後自己剩低分散牌又無牌權，因為可能被一波打到高扣分。
    const exposure = estimateRemainingPointExposureV9C(afterHand);
    if (!currentMoveSafe && afterHand.length >= 6 && exposure >= 9 && controlsAfter === 0) score -= 140;

    return score;
}

function findOneMoveForWholeHandV9D(hand) {
    if (!hand || hand.length === 0) return null;
    const moves = generateAllMoves(hand).filter(m => m.cards.length === hand.length && m.pattern);
    if (!moves.length) return null;
    moves.sort((a, b) => {
        const pa = a.pattern, pb = b.pattern;
        const ra = (pa.comboRank || 0) * 10000 + (pa.val || 0);
        const rb = (pb.comboRank || 0) * 10000 + (pb.val || 0);
        return rb - ra;
    });
    return moves[0];
}

function countOpponentBeatersForPatternV9D(pattern, state) {
    if (!pattern) return 0;
    let count = 0;
    for (const opp of state.opponents || []) {
        if (!opp || !opp.hand || opp.hand.length === 0) continue;
        const legal = generateLegalMoves(opp.hand, pattern, false, -1);
        if (legal && legal.length > 0) count++;
    }
    return count;
}

function canAnyOpponentBeatPatternV9D(pattern, state) {
    return countOpponentBeatersForPatternV9D(pattern, state) > 0;
}

function partitionMoveAdjustmentV9C(move, state, analyzer, beforePart, afterPart, beforeExposure, afterHand) {
    if (!beforePart || !afterPart) return 0;
    if (afterHand.length === 0) return 0;

    const pat = move.pattern;
    const totalMovesAfterThis = 1 + afterPart.moves;
    const moveCountDelta = beforePart.moves - totalMovesAfterThis;
    const routeCostDelta = beforePart.cost - (1000 + afterPart.cost);
    const afterExposure = estimateRemainingPointExposureV9C(afterHand);
    const exposureDrop = beforeExposure - afterExposure;
    const isBestLead = analyzer.isBestFirstMove(move);
    const weakBefore = countWeakSinglesV8C(state.hand);
    const weakAfter = countWeakSinglesV8C(afterHand);
    const controlsAfter = countControlCards(afterHand);

    let score = 0;

    // 主要目標：候選出牌後，剩餘手牌分解手數越少越好。
    score += moveCountDelta * 210;
    score += routeCostDelta * 0.055;

    // 如果這手正是 partition solver 覺得最自然的第一手，給 bonus；如果明顯破壞路線，扣分。
    if (isBestLead) score += state.isOpening ? 170 : 95;
    else if (state.isOpening && totalMovesAfterThis > beforePart.moves) score -= 130;

    // 計分制下，降低剩牌潛在扣分有價值，但不能大到壓過勝率搜尋。
    score += Math.max(-120, Math.min(160, exposureDrop * 4));

    // 分解後如果低孤張明顯變少，通常是好路線；反之容易出現差一手輸局。
    score += Math.max(-120, Math.min(160, (weakBefore - weakAfter) * 55));
    if (afterPart.lowSingles >= 3 && afterPart.moves >= 3) score -= 85;

    // 剩兩手內時，partition 訊號應該更強。
    if (afterPart.moves <= 1) score += 180;
    else if (afterPart.moves === 2 && afterHand.length <= 7) score += 95;

    // 主動打五張而且沒有增加總手數，通常比零碎單張好。
    if (state.isOpening && pat.len === 5 && totalMovesAfterThis <= beforePart.moves) score += 100;
    if (state.isOpening && pat.type === 'single' && totalMovesAfterThis > beforePart.moves && afterHand.length >= 6) score -= 90;

    // 防止為了分解過早耗盡控制牌。
    if (controlsAfter === 0 && afterPart.moves >= 3 && afterHand.length >= 6 && !state.anyOpponentLastCard) score -= 120;

    return score;
}

function makePartitionAnalyzerV9C(hand) {
    const cards = [...hand].sort((a, b) => a.value - b.value);
    const indexByValue = new Map(cards.map((c, i) => [c.value, i]));
    const fullMask = (1 << cards.length) - 1;
    const allMoves = generateAllMoves(cards)
        .map(m => ({ move: m, mask: maskOfCardsV9C(m.cards, indexByValue), cost: partitionMoveCostV9C(m) }))
        .filter(x => x.mask !== 0)
        .sort((a, b) => {
            const lenDiff = b.move.cards.length - a.move.cards.length;
            if (lenDiff) return lenDiff;
            return a.cost - b.cost;
        });
    const memo = new Map();

    function solveMask(mask) {
        if (mask === 0) return { moves: 0, cost: 0, firstMask: 0, lowSingles: 0, twoCount: 0, cardCount: 0 };
        if (memo.has(mask)) return memo.get(mask);

        let best = null;
        const quota = { 5: 0, 3: 0, 2: 0, 1: 0 };
        let considered = 0;
        for (const item of allMoves) {
            if ((item.mask & mask) !== item.mask) continue;
            const len = item.move.cards.length;
            const limit = len === 5 ? 10 : (len === 3 ? 3 : (len === 2 ? 7 : 6));
            if ((quota[len] || 0) >= limit) continue;
            quota[len] = (quota[len] || 0) + 1;
            considered++;

            const child = solveMask(mask ^ item.mask);
            const cand = {
                moves: 1 + child.moves,
                cost: item.cost + child.cost,
                firstMask: item.mask,
                lowSingles: 0,
                twoCount: 0,
                cardCount: 0
            };

            if (!best || cand.cost < best.cost || (cand.cost === best.cost && cand.moves < best.moves)) {
                best = cand;
            }
            if (considered >= 26) break;
        }

        if (!best) best = { moves: countBitsV9C(mask), cost: countBitsV9C(mask) * 1300, firstMask: 0, lowSingles: 0, twoCount: 0, cardCount: countBitsV9C(mask) };

        const shape = partitionMaskShapeV9C(mask, cards);
        best = { ...best, ...shape };
        memo.set(mask, best);
        return best;
    }

    function solveCards(subHand) {
        return solveMask(maskOfCardsV9C(subHand, indexByValue));
    }

    function isBestFirstMove(move) {
        const m = maskOfCardsV9C(move.cards, indexByValue);
        return m !== 0 && solveMask(fullMask).firstMask === m;
    }

    return { solveMask, solveCards, isBestFirstMove, fullMask };
}

function partitionMoveCostV9C(move) {
    const p = move.pattern;
    let cost = 1000;
    if (p.len === 5) cost -= 170 + (p.comboRank || 0) * 28;
    if (p.type === 'pair') cost -= 75;
    if (p.type === 'triple') cost -= 65;
    if (p.type === 'single') {
        const r = move.cards[0].rankVal;
        if (r <= VALUES['8']) cost += 130;
        else if (r <= VALUES['J']) cost += 55;
        else if (r >= VALUES['A']) cost -= 20;
    }

    const twos = move.cards.filter(c => c.rank === '2').length;
    const aces = move.cards.filter(c => c.rank === 'A').length;
    if (p.len === 5 && twos > 0 && p.comboRank <= FIVE_CARD_POWER.flush) cost += twos * 45;
    if (p.type === 'single' && twos > 0) cost -= 35;
    if (p.type === 'single' && aces > 0) cost -= 18;
    return Math.max(500, cost);
}

function maskOfCardsV9C(cards, indexByValue) {
    let mask = 0;
    for (const c of cards) {
        const idx = indexByValue.get(c.value);
        if (idx !== undefined) mask |= (1 << idx);
    }
    return mask;
}

function partitionMaskShapeV9C(mask, cards) {
    const rankCounts = new Map();
    let cardCount = 0;
    let twoCount = 0;
    for (let i = 0; i < cards.length; i++) {
        if (!(mask & (1 << i))) continue;
        const c = cards[i];
        cardCount++;
        if (c.rank === '2') twoCount++;
        rankCounts.set(c.rankVal, (rankCounts.get(c.rankVal) || 0) + 1);
    }
    let lowSingles = 0;
    for (let i = 0; i < cards.length; i++) {
        if (!(mask & (1 << i))) continue;
        const c = cards[i];
        if ((rankCounts.get(c.rankVal) || 0) === 1 && c.rankVal <= VALUES['9']) lowSingles++;
    }
    return { lowSingles, twoCount, cardCount };
}

function countBitsV9C(mask) {
    let n = 0;
    while (mask) { mask &= mask - 1; n++; }
    return n;
}

function estimateRemainingPointExposureV9C(hand) {
    if (!hand || hand.length === 0) return 0;
    let score = hand.length;
    if (hand.length >= 9) score *= 2;
    const twos = hand.filter(c => c.rank === '2').length;
    score *= Math.pow(2, twos);
    return score;
}


function chooseAIActionV8E(legalMoves, state) {
    // v8E 原則：以 v8D 為主體。
    // 只新增最後一張風險判斷；避免為了衝勝而留下低孤張或無牌權收官。
    const threat = buildOpponentThreatModelV7(state);
    const modeInfo = updateAIModeV8E(state, threat);

    // 非關鍵局面完全沿用 v8，避免模式系統污染 v8 原本最強的搜尋節奏。
    if (modeInfo.mode === 'normal' && !modeInfo.forceV8E) return chooseAIActionV8(legalMoves, state);

    const beforePlanLite = estimateMoveCountLite(state.hand);
    const beforeExact = beforePlanLite;
    const urgent = state.anyOpponentLastCard || state.anyOpponentTwoCards || threat.hasImmediateFinisher || state.lowestOpponentCards <= 5 || state.lag >= 4;
    let best = null;
    let bestScore = -Infinity;

    for (const move of legalMoves) {
        const afterHand = state.hand.filter(c => !move.cards.includes(c));
        const afterPlanLite = estimateMoveCountLite(afterHand);
        const afterExact = afterPlanLite;
        const optimalFirstLeg = isGoodPartitionLeadV6B(move, state, afterHand, beforeExact, afterExact);
        const info = getOpponentResponseInfoLite(move, state);
        const lethal = analyzeLethalOpponentRepliesV7(move, state, threat);
        const unbeatable = info.opponentsCanBeat === 0;
        const pat = move.pattern;
        const rank = Math.floor(pat.val / 4);
        const controlsUsed = move.cards.filter(c => c.rank === '2' || c.rank === 'A' || c.rankVal >= VALUES['K']).length;
        const lowLead = state.isOpening && ((pat.type === 'single' && rank <= VALUES['8']) || (pat.type === 'pair' && rank <= VALUES['10']));

        let score = 0;
        if (afterHand.length === 0) {
            score = 100000;
        } else {
            // v8 原本主體分數：不改。
            score += (beforePlanLite - afterPlanLite) * 520;
            score += move.cards.length * 85;
            score -= getStrengthCost(pat) * 1.05;
            score += evaluateHandShapeFast(afterHand) * 0.20;

            if (unbeatable) {
                score += 620;
                if (state.isFollowing) score += 260;
                if (afterPlanLite <= 2) score += 700;
                if (afterHand.length <= 5 && canBeOneMove(afterHand)) score += 1600;
                if (afterHand.length <= 8 && canFinishInTwoMovesV5(afterHand)) score += 850;
            } else {
                score -= 110 * info.opponentsCanBeat;
                if (state.isOpening && pat.len === 5 && pat.comboRank <= FIVE_CARD_POWER.flush && afterPlanLite > 2) score -= 180;
                if (state.isOpening && pat.type === 'single' && rank >= VALUES['Q'] && !urgent) score -= 150;
            }

            if (state.anyOpponentLastCard) {
                if (state.isFollowing) score += 260;
                if (unbeatable) score += 350;
                if (state.isOpening && pat.type === 'single') score -= threat.oneCard.length > 0 ? 130 : 0;
                if (pat.type !== 'single') score += 180;
            }
            if (state.anyOpponentTwoCards) {
                if (pat.type === 'pair') score += 360;
                if (state.isOpening && pat.type === 'single' && afterPlanLite > 1) score -= 210;
            }

            if (lowLead && !threat.hasImmediateFinisher) score += 130;
            if (state.isOpening && pat.type === 'single' && rank >= VALUES['K'] && afterPlanLite > 1 && !urgent) score -= 230;

            if (controlsUsed > 0) {
                if (unbeatable || urgent || afterPlanLite <= 2) score += controlsUsed * 85;
                else score -= controlsUsed * 130;
            }

            if (state.lag >= 5) score += state.lag * 70 + move.cards.length * 42;
            if (state.isFirstRound && pat.len === 5 && pat.comboRank >= FIVE_CARD_POWER.fullhouse && !unbeatable && afterPlanLite > 2) score -= 360;

            const exactGain = beforeExact - afterExact;
            score += exactGain * 430;
            if (optimalFirstLeg) score += state.isOpening ? 360 : 160;
            else if (state.isOpening && !urgent) score -= 130;

            if (afterExact <= 1) score += 1150;
            else if (afterExact === 2) score += 520;
            else if (afterExact === 3 && afterHand.length <= 7) score += 180;

            score += defensiveAntiCollapseBonusV6B(move, state, info, afterHand, afterExact, unbeatable);
            const threatScoreParts = opponentThreatMoveScoresV8(move, state, threat, lethal, afterHand, afterExact, unbeatable);
            score += threatScoreParts.defense + threatScoreParts.offense;
            score += gapRiskProtectionV8(move, state, info, lethal, afterHand, afterExact, unbeatable);
            score += controlStreakAdjustmentV8(move, state, info, afterHand, afterExact, unbeatable);

            // v8D：模式只微調；只有 finish mode 可明顯加分。
            score += modeAdjustmentV8D(move, state, modeInfo, threat, lethal, info, afterHand, afterExact, unbeatable);
            score += finalCardRiskAdjustmentV8E(move, state, modeInfo, threat, lethal, info, afterHand, afterExact, unbeatable);
        }

        const raw = normalizeAIScoreV5(score);
        move.aiScore = raw;
        move.pattern.aiScore = raw;
        move.pattern.aiMode = modeInfo.mode;
        if (raw > bestScore) {
            bestScore = raw;
            best = move;
        }
    }

    // rollout 條件回到 v8，只有 finish 額外啟用；survive/block 不再強制 rollout。
    if (state.hand.length <= 10 || state.lowestOpponentCards <= 5 || urgent || modeInfo.mode === 'finish') {
        const candidates = [...legalMoves].sort((a, b) => b.aiScore - a.aiScore).slice(0, 14);
        let rolloutBest = best;
        let rolloutBestScore = -Infinity;
        for (const m of candidates) {
            const result = rolloutAfterCandidateV5(m, state);
            const lethal = analyzeLethalOpponentRepliesV7(m, state, threat);
            const afterHand = state.hand.filter(c => !m.cards.includes(c));
            const afterExact = estimateMoveCountLite(afterHand);
            let rs = m.aiScore;
            if (result.winner === state.playerIdx) rs += 5000;
            else if (result.winner >= 0) rs -= 1800;
            rs -= result.myRemain * 115;
            rs += result.minOppRemain * 35;

            if (result.myRemain >= 8) rs -= 650;
            if (result.myRemain >= 10) rs -= 650;
            if (result.minOppRemain <= 1 && result.myRemain >= 4) rs -= 280;

            if (lethal.total > 0) rs -= 1200 + lethal.total * 420;
            if (lethal.oneCard > 0) rs -= 900;
            if (lethal.pair > 0) rs -= 650;
            if (lethal.fiveCard > 0) rs -= 650;

            rs += rolloutRiskAdjustmentV8(m, state, result, lethal);
            rs += rolloutModeAdjustmentV8D(m, state, modeInfo, result, afterHand, afterExact);
            rs += rolloutFinalCardRiskAdjustmentV8E(m, state, modeInfo, result, afterHand, afterExact);

            if (rs > rolloutBestScore) {
                rolloutBestScore = rs;
                rolloutBest = m;
            }
        }
        best = rolloutBest;
        bestScore = Math.max(bestScore, rolloutBestScore);
        if (best) {
            const raw = normalizeAIScoreV5(bestScore);
            best.aiScore = raw;
            best.pattern.aiScore = raw;
            best.pattern.aiMode = modeInfo.mode;
        }
    }

    if (!isFirstRound && lastPlayedCards) {
        let passScore = scorePass(state);
        passScore += opponentThreatPassAdjustmentV8(state, threat);
        passScore += controlStreakPassAdjustmentV8(state);
        passScore += passModeAdjustmentV8D(state, modeInfo, threat);
        if (state.lowestOpponentCards <= 2) passScore -= 250;
        if (state.lag >= 6) passScore -= 220;
        if (state.anyOpponentLastCard) passScore -= 180;
        if (!urgent && bestScore < passScore + 35) return null;
        if (urgent && bestScore < passScore - 160) return null;
    }
    return { move: best, score: bestScore, mode: modeInfo.mode };
}

function updateAIModeV8E(state, threat) {
    const base = updateAIModeV8D(state, threat);
    const currentMoves = estimateMoveCountLite(state.hand);
    const weakSingles = countWeakSinglesV8C(state.hand);
    const controls = countControlCards(state.hand);

    // v8E 只在收官/近收官時稍微提高模式介入。
    // 目的不是重回 v8C 的強模式切換，而是提早處理「最後會剩低孤張」的局面。
    let mode = base.mode;
    let reason = base.reason;
    let forceV8E = !!base.forceV8D;

    if (state.hand.length <= 6 && weakSingles >= 1 && currentMoves <= 4) {
        mode = 'finish';
        reason = 'finalLowSingleRisk';
        forceV8E = true;
    } else if (state.hand.length <= 7 && controls >= 1 && currentMoves <= 3) {
        mode = 'finish';
        reason = 'nearFinishWithControl';
        forceV8E = true;
    }

    return { ...base, mode, reason, currentMoves, weakSingles, controls, forceV8E };
}

function lastSingleRiskInfoV8E(card, state) {
    if (!card) return { beaters: 0, replies: 0, safe: false };
    const singlePattern = analyzePattern([card]);
    let beaters = 0;
    let replies = 0;
    for (const opponent of state.opponents) {
        if (!opponent || opponent.hand.length === 0) continue;
        const legal = generateLegalMoves(opponent.hand, singlePattern, false, -1);
        const singles = legal.filter(m => m.pattern && m.pattern.type === 'single');
        if (singles.length > 0) beaters += 1;
        replies += singles.length;
    }
    return { beaters, replies, safe: beaters === 0 };
}

function finalCardRiskAdjustmentV8E(move, state, modeInfo, threat, lethal, info, afterHand, afterExact, unbeatable) {
    if (!afterHand || afterHand.length === 0) return 0;
    const beforeExact = modeInfo.currentMoves || estimateMoveCountLite(state.hand);
    const pat = move.pattern;
    const rank = Math.floor(pat.val / 4);
    const beforeWeak = countWeakSinglesV8C(state.hand);
    const afterWeak = countWeakSinglesV8C(afterHand);
    const weakCleared = weakCardsClearedV8C(move.cards, state.hand);
    const controlsAfter = countControlCards(afterHand);
    const controlsUsed = move.cards.filter(c => c.rank === '2' || c.rank === 'A' || c.rankVal >= VALUES['K']).length;
    const exactGain = beforeExact - afterExact;
    let score = 0;

    // 1. 直接避免「剩一張低牌」：這是 v8/v8D 差一手輸局的主要來源。
    if (afterHand.length === 1) {
        const last = afterHand[0];
        const risk = lastSingleRiskInfoV8E(last, state);
        if (isLowSingleCardV8C(last)) {
            score -= 760;
            score -= risk.beaters * 170;
            if (!unbeatable) score -= 180;
        } else if (last.rankVal <= VALUES['J']) {
            score -= 360;
            score -= risk.beaters * 110;
        } else if (last.rankVal <= VALUES['K']) {
            score -= 120;
            score -= risk.beaters * 60;
        }
        if (risk.safe) score += 340;
        if (unbeatable) score += 180; // 這手若能穩拿牌權，剩一張的風險稍低。
        if (state.lowestOpponentCards <= 2 && !risk.safe) score -= 220;
    }

    // 2. 剩兩三張但不是一手可走，且包含低孤張：應提早清掉，而不是留到最後。
    if (afterHand.length >= 2 && afterHand.length <= 3) {
        const oneMove = canBeOneMove(afterHand);
        if (!oneMove && afterWeak > 0) {
            score -= 280 + afterWeak * 140;
            if (!unbeatable) score -= 120;
        }
        if (!oneMove && controlsAfter === 0 && state.lowestOpponentCards <= 4) score -= 160;
        if (oneMove && (unbeatable || controlsAfter > 0 || afterExact <= 1)) score += 180;
    }

    // 3. 收官前鼓勵清低孤張。尤其在自己 6 張以下時，低孤張通常比保大牌更急。
    if (state.hand.length <= 7) {
        score += Math.max(0, beforeWeak - afterWeak) * 170;
        score += weakCleared * 120;
        if (pat.type === 'single' && rank <= VALUES['9']) score += 120;
        if (exactGain > 0 && weakCleared > 0) score += 120;
    }

    // 4. 如果用光控制牌卻仍要兩手以上，而且留下弱孤張，扣分。
    if (controlsUsed > 0 && controlsAfter === 0 && afterExact > 1 && afterWeak > 0 && !state.anyOpponentLastCard) {
        score -= 190 + afterWeak * 60;
    }

    // 5. 但不要過度保守：如果這手把手數明顯降下來，而且沒有留下弱單張，給回補償。
    if (exactGain >= 2 && afterWeak === 0) score += 180;
    if (afterExact <= 1 && afterWeak === 0) score += 240;

    return score;
}

function rolloutFinalCardRiskAdjustmentV8E(move, state, modeInfo, result, afterHand, afterExact) {
    let score = 0;
    if (!afterHand || afterHand.length === 0) return 0;
    if (result.winner === state.playerIdx) return 120;

    if (afterHand.length === 1) {
        const last = afterHand[0];
        const risk = lastSingleRiskInfoV8E(last, state);
        if (isLowSingleCardV8C(last)) score -= 260 + risk.beaters * 80;
        else if (last.rankVal <= VALUES['J']) score -= 140 + risk.beaters * 50;
        if (risk.safe) score += 150;
    }

    if (result.myRemain === 1 && result.winner !== state.playerIdx) score -= 160;
    if (result.myRemain >= 4 && afterHand.length <= 3) score -= 80;
    return score;
}

function updateAIModeV8D(state, threat) {

    } else if (mode === 'survive') {

        score += move.cards.length * 25;

function countWeakSinglesV8C(hand) {

    return n;
}

}

function weakCardsClearedV8C(cards, originalHand) {

}

function chooseAIActionV8(legalMoves, state) {
    // v8 原則：保留 v7 的威脅模型，額外加入風險保護與連續牌權懲罰。
    // 避免 v7 為了提高勝率而增加慘敗；同時記錄與壓制差一手輸掉的風險。
    const threat = buildOpponentThreatModelV7(state);
    // 普通中盤不啟動 v8 額外模型，避免速度下降與噪音；
    // 只有在有人可一手走完、對手連續掌控牌權、或自己嚴重落後時才啟用。
    if (!threat.hasImmediateFinisher && !state.opponentControlStreak && state.lag < 6) return chooseAIActionV6B(legalMoves, state);

    const beforePlanLite = estimateMoveCountLite(state.hand);
    const beforeExact = beforePlanLite;
    const urgent = state.anyOpponentLastCard || state.anyOpponentTwoCards || threat.hasImmediateFinisher || state.lowestOpponentCards <= 5 || state.lag >= 4;
    let best = null;
    let bestScore = -Infinity;

    for (const move of legalMoves) {
        const afterHand = state.hand.filter(c => !move.cards.includes(c));
        const afterPlanLite = estimateMoveCountLite(afterHand);
        const afterExact = afterPlanLite;
        const optimalFirstLeg = isGoodPartitionLeadV6B(move, state, afterHand, beforeExact, afterExact);
        const info = getOpponentResponseInfoLite(move, state);
        const lethal = analyzeLethalOpponentRepliesV7(move, state, threat);
        const unbeatable = info.opponentsCanBeat === 0;
        const pat = move.pattern;
        const rank = Math.floor(pat.val / 4);
        const controlsUsed = move.cards.filter(c => c.rank === '2' || c.rank === 'A' || c.rankVal >= VALUES['K']).length;
        const lowLead = state.isOpening && ((pat.type === 'single' && rank <= VALUES['8']) || (pat.type === 'pair' && rank <= VALUES['10']));

        let score = 0;
        if (afterHand.length === 0) {
            score = 100000;
        } else {
            score += (beforePlanLite - afterPlanLite) * 520;
            score += move.cards.length * 85;
            score -= getStrengthCost(pat) * 1.05;
            score += evaluateHandShapeFast(afterHand) * 0.20;

            if (unbeatable) {
                score += 620;
                if (state.isFollowing) score += 260;
                if (afterPlanLite <= 2) score += 700;
                if (afterHand.length <= 5 && canBeOneMove(afterHand)) score += 1600;
                if (afterHand.length <= 8 && canFinishInTwoMovesV5(afterHand)) score += 850;
            } else {
                score -= 110 * info.opponentsCanBeat;
                if (state.isOpening && pat.len === 5 && pat.comboRank <= FIVE_CARD_POWER.flush && afterPlanLite > 2) score -= 180;
                if (state.isOpening && pat.type === 'single' && rank >= VALUES['Q'] && !urgent) score -= 150;
            }

            if (state.anyOpponentLastCard) {
                if (state.isFollowing) score += 260;
                if (unbeatable) score += 350;
                // v7 修正：主動開局時，對手剩一張，單張不是必然好事；如果對方能直接壓完，重扣。
                if (state.isOpening && pat.type === 'single') score -= threat.oneCard.length > 0 ? 130 : 0;
                if (pat.type !== 'single') score += 180;
            }
            if (state.anyOpponentTwoCards) {
                if (pat.type === 'pair') score += 360;
                if (state.isOpening && pat.type === 'single' && afterPlanLite > 1) score -= 210;
            }

            if (lowLead && !threat.hasImmediateFinisher) score += 130;
            if (state.isOpening && pat.type === 'single' && rank >= VALUES['K'] && afterPlanLite > 1 && !urgent) score -= 230;

            if (controlsUsed > 0) {
                if (unbeatable || urgent || afterPlanLite <= 2) score += controlsUsed * 85;
                else score -= controlsUsed * 130;
            }

            if (state.lag >= 5) score += state.lag * 70 + move.cards.length * 42;
            if (state.isFirstRound && pat.len === 5 && pat.comboRank >= FIVE_CARD_POWER.fullhouse && !unbeatable && afterPlanLite > 2) score -= 360;

            const exactGain = beforeExact - afterExact;
            score += exactGain * 430;
            if (optimalFirstLeg) score += state.isOpening ? 360 : 160;
            else if (state.isOpening && !urgent) score -= 130;

            if (afterExact <= 1) score += 1150;
            else if (afterExact === 2) score += 520;
            else if (afterExact === 3 && afterHand.length <= 7) score += 180;

            score += defensiveAntiCollapseBonusV6B(move, state, info, afterHand, afterExact, unbeatable);
            const threatScoreParts = opponentThreatMoveScoresV8(move, state, threat, lethal, afterHand, afterExact, unbeatable);
            score += threatScoreParts.defense + threatScoreParts.offense;
            score += gapRiskProtectionV8(move, state, info, lethal, afterHand, afterExact, unbeatable);
            score += controlStreakAdjustmentV8(move, state, info, afterHand, afterExact, unbeatable);
        }

        const raw = normalizeAIScoreV5(score);
        move.aiScore = raw;
        move.pattern.aiScore = raw;
        if (raw > bestScore) {
            bestScore = raw;
            best = move;
        }
    }

    if (state.hand.length <= 10 || state.lowestOpponentCards <= 5 || urgent) {
        const candidates = [...legalMoves].sort((a, b) => b.aiScore - a.aiScore).slice(0, 12);
        let rolloutBest = best;
        let rolloutBestScore = -Infinity;
        for (const m of candidates) {
            const result = rolloutAfterCandidateV5(m, state);
            const lethal = analyzeLethalOpponentRepliesV7(m, state, threat);
            let rs = m.aiScore;
            if (result.winner === state.playerIdx) rs += 5000;
            else if (result.winner >= 0) rs -= 1800;
            rs -= result.myRemain * 115;
            rs += result.minOppRemain * 35;

            if (result.myRemain >= 8) rs -= 650;
            if (result.minOppRemain <= 1 && result.myRemain >= 4) rs -= 280;

            // v7：如果候選手會讓剩 1/2/5 張的對手直接回應出完，rollout 前就重扣。
            if (lethal.total > 0) rs -= 1200 + lethal.total * 420;
            if (lethal.oneCard > 0) rs -= 900;
            if (lethal.pair > 0) rs -= 650;
            if (lethal.fiveCard > 0) rs -= 650;

            rs += rolloutRiskAdjustmentV8(m, state, result, lethal);

            if (rs > rolloutBestScore) {
                rolloutBestScore = rs;
                rolloutBest = m;
            }
        }
        best = rolloutBest;
        bestScore = Math.max(bestScore, rolloutBestScore);
        if (best) {
            const raw = normalizeAIScoreV5(bestScore);
            best.aiScore = raw;
            best.pattern.aiScore = raw;
        }
    }

    if (!isFirstRound && lastPlayedCards) {
        let passScore = scorePass(state);
        passScore += opponentThreatPassAdjustmentV8(state, threat);
        passScore += controlStreakPassAdjustmentV8(state);
        if (state.lowestOpponentCards <= 2) passScore -= 250;
        if (state.lag >= 6) passScore -= 220;
        if (state.anyOpponentLastCard) passScore -= 180;
        if (!urgent && bestScore < passScore + 35) return null;
        if (urgent && bestScore < passScore - 160) return null;
    }
    return { move: best, score: bestScore };
}
