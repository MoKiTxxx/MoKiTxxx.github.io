        const afterPlanLite = estimateMoveCountLite(afterHand);
        const afterExact = afterPlanLite;
        const optimalFirstLeg = isGoodPartitionLeadV6B(move, state, afterHand, beforeExact, afterExact);
        const info = getOpponentResponseInfoLite(move, state);
        const lethal = analyzeLethalOpponentRepliesV7(move, state, threat);
        const unbeatable = info.opponentsCanBeat === 0;
        const pat = move.pattern;
        const rank = Math.floor(pat.val / 4);
        const controlsUsed = move.cards.filter(c => c.rank === '2' || c.rank === 'A' || c.rankVal >= VALUES['K']).length;
        const lowLead = state.isOpening && ((pat.type === 'single' && rank <= VALUES['8']) || (pat.type === 'pair' && rank <= VALUES['10']));

        let score = 0;
        if (afterHand.length === 0) {
            score = 100000;
        } else {
            score += (beforePlanLite - afterPlanLite) * 520;
            score += move.cards.length * 85;
            score -= getStrengthCost(pat) * 1.05;
            score += evaluateHandShapeFast(afterHand) * 0.20;

            if (unbeatable) {
                score += 620;
                if (state.isFollowing) score += 260;
                if (afterPlanLite <= 2) score += 700;
                if (afterHand.length <= 5 && canBeOneMove(afterHand)) score += 1600;
                if (afterHand.length <= 8 && canFinishInTwoMovesV5(afterHand)) score += 850;
            } else {
                score -= 110 * info.opponentsCanBeat;
                if (state.isOpening && pat.len === 5 && pat.comboRank <= FIVE_CARD_POWER.flush && afterPlanLite > 2) score -= 180;
                if (state.isOpening && pat.type === 'single' && rank >= VALUES['Q'] && !urgent) score -= 150;
            }

            if (state.anyOpponentLastCard) {
                if (state.isFollowing) score += 260;
                if (unbeatable) score += 350;
                // v7 修正：主動開局時，對手剩一張，單張不是必然好事；如果對方能直接壓完，重扣。
                if (state.isOpening && pat.type === 'single') score -= threat.oneCard.length > 0 ? 130 : 0;
                if (pat.type !== 'single') score += 180;
            }
            if (state.anyOpponentTwoCards) {
                if (pat.type === 'pair') score += 360;
                if (state.isOpening && pat.type === 'single' && afterPlanLite > 1) score -= 210;
            }

            if (lowLead && !threat.hasImmediateFinisher) score += 130;
            if (state.isOpening && pat.type === 'single' && rank >= VALUES['K'] && afterPlanLite > 1 && !urgent) score -= 230;

            if (controlsUsed > 0) {
                if (unbeatable || urgent || afterPlanLite <= 2) score += controlsUsed * 85;
                else score -= controlsUsed * 130;
            }

            if (state.lag >= 5) score += state.lag * 70 + move.cards.length * 42;
            if (state.isFirstRound && pat.len === 5 && pat.comboRank >= FIVE_CARD_POWER.fullhouse && !unbeatable && afterPlanLite > 2) score -= 360;

            const exactGain = beforeExact - afterExact;
            score += exactGain * 430;
            if (optimalFirstLeg) score += state.isOpening ? 360 : 160;
            else if (state.isOpening && !urgent) score -= 130;

            if (afterExact <= 1) score += 1150;
            else if (afterExact === 2) score += 520;
            else if (afterExact === 3 && afterHand.length <= 7) score += 180;

            score += defensiveAntiCollapseBonusV6B(move, state, info, afterHand, afterExact, unbeatable);
            score += opponentThreatMoveBonusV7(move, state, threat, lethal, afterHand, afterExact, unbeatable);
        }

        const raw = normalizeAIScoreV5(score);
        move.aiScore = raw;
        move.pattern.aiScore = raw;
        if (raw > bestScore) {
            bestScore = raw;
            best = move;
        }
    }

    if (state.hand.length <= 10 || state.lowestOpponentCards <= 5 || urgent) {
        const candidates = [...legalMoves].sort((a, b) => b.aiScore - a.aiScore).slice(0, 12);
        let rolloutBest = best;
        let rolloutBestScore = -Infinity;
        for (const m of candidates) {
            const result = rolloutAfterCandidateV5(m, state);
            const lethal = analyzeLethalOpponentRepliesV7(m, state, threat);
            let rs = m.aiScore;
            if (result.winner === state.playerIdx) rs += 5000;
            else if (result.winner >= 0) rs -= 1800;
            rs -= result.myRemain * 115;
            rs += result.minOppRemain * 35;

            if (result.myRemain >= 8) rs -= 650;
            if (result.minOppRemain <= 1 && result.myRemain >= 4) rs -= 280;

            // v7：如果候選手會讓剩 1/2/5 張的對手直接回應出完，rollout 前就重扣。
            if (lethal.total > 0) rs -= 1200 + lethal.total * 420;
            if (lethal.oneCard > 0) rs -= 900;
            if (lethal.pair > 0) rs -= 650;
            if (lethal.fiveCard > 0) rs -= 650;

            if (rs > rolloutBestScore) {
                rolloutBestScore = rs;
                rolloutBest = m;
            }
        }
        best = rolloutBest;
        bestScore = Math.max(bestScore, rolloutBestScore);
        if (best) {
            const raw = normalizeAIScoreV5(bestScore);
            best.aiScore = raw;
            best.pattern.aiScore = raw;
        }
    }

    if (!isFirstRound && lastPlayedCards) {
        let passScore = scorePass(state);
        passScore += opponentThreatPassAdjustmentV7(state, threat);
        if (state.lowestOpponentCards <= 2) passScore -= 250;
        if (state.lag >= 6) passScore -= 220;
        if (state.anyOpponentLastCard) passScore -= 180;
        if (!urgent && bestScore < passScore + 35) return null;
        if (urgent && bestScore < passScore - 160) return null;
    }
    return { move: best, score: bestScore };
}


function opponentThreatMoveScoresV8(move, state, threat, lethal, afterHand, afterExact, unbeatable) {
    // 將 v7 威脅模型拆成兩個可調分量：
    // defense：避免對手一手走完；offense：自己已有短線勝利路線時仍然進攻。
    const base = opponentThreatMoveBonusV7(move, state, threat, lethal, afterHand, afterExact, unbeatable);
    let defense = base;
    let offense = 0;

    if (afterExact <= 2 && lethal.total === 0) offense += 180;
    if (afterHand.length <= 5 && canBeOneMove(afterHand) && lethal.total === 0) offense += 260;
    if (unbeatable && afterExact <= 2) offense += 130;

    // 若自己已經明顯落後，不讓攻擊分把防守懲罰完全沖掉。
    if (state.lag >= 6 && lethal.total > 0) offense = Math.min(offense, 120);
    return { defense, offense };
}

function gapRiskProtectionV8(move, state, info, lethal, afterHand, afterExact, unbeatable) {
    let score = 0;
    const pat = move.pattern;
    const rank = Math.floor(pat.val / 4);

    // 剩牌差距保護：自己比最少牌對手多很多時，避免打出容易交回牌權的小牌。
    if (state.lag >= 6) {
        if (!unbeatable && info.opponentsCanBeat >= 2 && afterHand.length >= 7 && afterExact > 3) {
            score -= 260 + state.lag * 32;
        }
        if (state.isOpening && pat.type === 'single' && rank <= VALUES['J'] && !unbeatable && afterExact > 3) {
            score -= 180;
        }
        if (move.cards.length >= 3) score += 120;
        if (move.cards.length >= 5) score += 160;
        if (unbeatable && move.cards.length >= 2) score += 110;
    }

    // 如果這手會把自己留下很多散牌，且對手能接牌，降低評價。
    if (!unbeatable && afterHand.length >= 8 && countOrphanSinglesV8(afterHand) >= 5) {
        score -= 190;
    }

    // 不再為了阻止對手而過早燒掉最後控制牌，除非這手足夠安全或自己快出完。
    const controlsLeft = countControlCards(afterHand);
    const controlsUsed = move.cards.filter(c => c.rank === '2' || c.rank === 'A' || c.rankVal >= VALUES['K']).length;
    if (controlsUsed > 0 && controlsLeft === 0 && !unbeatable && afterExact > 2 && !state.anyOpponentLastCard) {
        score -= 180;
    }

    // 致命回應仍然優先處理。
    if (lethal && lethal.total > 0 && state.lag >= 5) score -= 260;
    return score;
}

function countOrphanSinglesV8(hand) {
    const counts = getRankCounts(hand);
    let n = 0;
    for (const c of hand) if ((counts.get(c.rankVal) || 0) === 1) n++;
    return n;
}

function controlStreakAdjustmentV8(move, state, info, afterHand, afterExact, unbeatable) {
    // 對手連續掌控牌權：若同一對手連續開新輪，v8 會更重視搶回牌權，避免被一波帶走。
    if (!state.opponentControlStreak) return 0;
    let score = 0;
    const streakOwner = state.openingControlOwner;
    const streak = state.openingControlStreak || 0;

    if (state.isFollowing && lastPlayedCards && lastPlayedCards.owner === streakOwner) {
        score += 140 + streak * 35;
        if (unbeatable) score += 260;
        if (!unbeatable && info.opponentsCanBeat >= 2 && afterExact > 3) score -= 120;
    }

    if (state.isOpening) {
        if (unbeatable) score += 120;
        if (move.cards.length >= 5) score += 90;
        if (move.pattern.type === 'single' && !unbeatable && afterExact > 3) score -= 120;
    }

    if (afterExact <= 2) score += 90;
    return score;
}

function rolloutRiskAdjustmentV8(move, state, result, lethal) {
    let score = 0;
    if (result.myRemain >= 8) score -= 280;
    if (result.myRemain >= 10) score -= 300;
    if (result.minOppRemain <= 1 && result.myRemain >= 4) score -= 180;
    if (lethal && lethal.total > 0) score -= 220;
    if (state.opponentControlStreak && result.winner !== state.playerIdx && result.myRemain >= 5) score -= 180;
    return score;
}

function opponentThreatPassAdjustmentV8(state, threat) {
    let score = opponentThreatPassAdjustmentV7(state, threat);
    if (state.lag >= 6) score -= 120;
    if (state.opponentControlStreak && lastPlayedCards && lastPlayedCards.owner === state.openingControlOwner) score -= 160;
    return score;
}

function controlStreakPassAdjustmentV8(state) {
    if (!state.opponentControlStreak) return 0;
    if (!lastPlayedCards || lastPlayedCards.owner !== state.openingControlOwner) return 0;
    return -130 - Math.max(0, state.openingControlStreak - 2) * 35;
}

function buildOpponentThreatModelV7(state) {
    const model = {
        oneCard: [],
        twoCard: [],
        pairFinishers: [],
        fiveCardFinishers: [],
        immediateFinishers: [],
        hasImmediateFinisher: false,
        maxThreat: 0
    };

    for (const opponent of state.opponents) {
        const hand = opponent.hand || [];
        const len = hand.length;
        const pat = analyzePattern(hand);
        const item = { player: opponent, len, pattern: pat, canFinish: !!pat };

        if (len === 1) {
            model.oneCard.push(item);
            model.immediateFinishers.push(item);
            model.maxThreat = Math.max(model.maxThreat, 5);
        } else if (len === 2) {
            model.twoCard.push(item);
            if (pat && pat.type === 'pair') {
                model.pairFinishers.push(item);
                model.immediateFinishers.push(item);
                model.maxThreat = Math.max(model.maxThreat, 4);
            } else {
                model.maxThreat = Math.max(model.maxThreat, 2);
            }
        } else if (len === 5 && pat) {
            model.fiveCardFinishers.push(item);
            model.immediateFinishers.push(item);
            model.maxThreat = Math.max(model.maxThreat, 4);
        } else if (len <= 5 && pat) {
            model.immediateFinishers.push(item);
            model.maxThreat = Math.max(model.maxThreat, 3);
        } else if (len <= 3) {
            model.maxThreat = Math.max(model.maxThreat, 2);
        }
    }
    model.hasImmediateFinisher = model.immediateFinishers.length > 0;
    return model;
}

function analyzeLethalOpponentRepliesV7(move, state, threat) {
    const result = { total: 0, oneCard: 0, pair: 0, fiveCard: 0, others: 0 };
    if (!move || !move.pattern || !threat || !threat.immediateFinishers) return result;

    for (const item of threat.immediateFinishers) {
        // 對手若手上所有牌本身就是一個合法牌型，只要該牌型能壓過這手，就代表他可以「直接回應出完」。
        // 不用重新 generateLegalMoves，速度會快很多。
        const lethal = !!(item.pattern && canBeat(item.pattern, move.pattern));
        if (!lethal) continue;
        result.total += 1;
        if (item.len === 1) result.oneCard += 1;
        else if (item.len === 2 && item.pattern && item.pattern.type === 'pair') result.pair += 1;
        else if (item.len === 5 && item.pattern) result.fiveCard += 1;
        else result.others += 1;
    }
    return result;
}

function opponentThreatMoveBonusV7(move, state, threat, lethal, afterHand, afterExact, unbeatable) {
    if (!threat || threat.maxThreat <= 0) return 0;
    const pat = move.pattern;
    let score = 0;

    // 1. 絕對禁止把牌型送到對手手上直接出完，除非自己也正在出完。
    if (lethal.total > 0) {
        score -= 1500 + lethal.total * 520;
        if (lethal.oneCard > 0) score -= 900;
        if (lethal.pair > 0) score -= 700;
        if (lethal.fiveCard > 0) score -= 700;
    }

    // 2. 若對手已經能一手走完，主動出不同長度/類型的牌可以暫時鎖住他。
    if (state.isOpening && threat.hasImmediateFinisher) {
        for (const item of threat.immediateFinishers) {
            const oppLen = item.len;
            const sameLength = pat.len === oppLen;
            const fiveVsFive = pat.len === 5 && oppLen === 5;
            if (!sameLength && !(fiveVsFive)) score += 190;
            if (oppLen === 1 && pat.type !== 'single') score += 260;
            if (oppLen === 2 && item.pattern && item.pattern.type === 'pair' && pat.type !== 'pair') score += 210;
            if (oppLen === 5 && item.pattern && pat.len !== 5) score += 210;
        }
    }

    // 3. 但如果自己已經能兩手內走完，進攻仍然要優先。
    if (afterExact <= 2 && (unbeatable || lethal.total === 0)) score += 320;
    if (afterHand.length <= 5 && canBeOneMove(afterHand) && lethal.total === 0) score += 620;

    // 4. 對手剩 2 張而且實際是一對：不要無腦送 pair 給他；只有壓死或高安全 pair 才加分。
    if (threat.pairFinishers.length > 0) {
        if (pat.type === 'pair') {
            if (lethal.pair > 0) score -= 900;
            else if (unbeatable) score += 360;
            else score -= 120;
        } else if (state.isOpening) {
            score += 160;
        }
    }

    // 5. 對手剩 5 張且是一手牌：避免主動開五張讓他剛好接走，除非我們這手是高安全五張。
    if (threat.fiveCardFinishers.length > 0) {
        if (pat.len === 5) {
            if (lethal.fiveCard > 0) score -= 900;
            else if (unbeatable) score += 330;
            else score -= 80;
        } else if (state.isOpening) {
            score += 140;
        }
    }

    // 6. 如果這手可保證牌權，且阻斷至少一個一手走完對手，額外加分。
    if (unbeatable && threat.hasImmediateFinisher && lethal.total === 0) {
        score += 260 + threat.maxThreat * 40;
    }

    return score;
}

function opponentThreatPassAdjustmentV7(state, threat) {
    if (!threat) return 0;
    let score = 0;
    if (threat.oneCard.length > 0) score -= 320;
    if (threat.pairFinishers.length > 0) score -= 250;
    if (threat.fiveCardFinishers.length > 0) score -= 210;
    if (threat.immediateFinishers.length >= 2) score -= 180;
    if (lastPlayedCards && lastPlayedCards.owner !== state.playerIdx) {
        const owner = players[lastPlayedCards.owner];
        if (owner && owner.hand.length <= 2) score -= 260;
        if (owner && owner.hand.length === 5 && analyzePattern(owner.hand)) score -= 180;
    }
    return score;
}

function defensiveAntiCollapseBonusV6B(move, state, info, afterHand, afterExact, unbeatable) {
    const pat = move.pattern;
    let score = 0;

    const oneCardOpps = state.opponents.filter(p => p.hand.length === 1).length;
    const twoCardOpps = state.opponents.filter(p => p.hand.length === 2).length;
    const fiveCardOpps = state.opponents.filter(p => p.hand.length === 5).length;

    if (oneCardOpps > 0) {
        if (state.isFollowing) score += 300;
        if (pat.type === 'single') score += 180;
        if (unbeatable) score += 420;
        if (state.isOpening && pat.type !== 'single' && afterExact > 1) score -= 260;
    }

    if (twoCardOpps > 0) {
        if (pat.type === 'pair') score += 360;
        if (unbeatable && pat.type === 'pair') score += 280;
        if (state.isOpening && pat.type === 'single' && afterExact > 1) score -= 180;
    }

    if (fiveCardOpps > 0) {
        if (pat.len === 5) score += 180;
        if (pat.len === 5 && unbeatable) score += 230;
        if (state.isOpening && pat.len !== 5 && afterExact > 2) score -= 110;
    }

    // 落後很多時，不追求漂亮拆牌，先避免全局被帶走。
    if (state.lag >= 6) {
        score += move.cards.length * 70;
        if (state.isFollowing) score += 180;
        if (unbeatable) score += 180;
        if (afterHand.length <= state.hand.length - 3) score += 120;
    }

    // 如果這手很可能立刻被多人壓，且自己還剩很多，避免把控制權送出去。
    if (!unbeatable && info.opponentsCanBeat >= 2 && afterHand.length >= 7 && afterExact > 3) {
        score -= 180;
    }

    return score;
}


function isGoodPartitionLeadV6B(move, state, afterHand, beforeExact, afterExact) {
    // 快速判斷這手是否像「最少手數分解」中的合理第一手。
    // 不做完整 DFS，避免測試模式過慢。
    if (afterHand.length === 0) return true;
    if (1 + afterExact < beforeExact) return true;
    if (1 + afterExact === beforeExact) return true;
    const p = move.pattern;
    if (state.isOpening && p.len === 5 && afterExact <= beforeExact) return true;
    if (state.isOpening && p.type === 'pair' && afterExact <= beforeExact && afterHand.length <= 8) return true;
    return false;
}

function makeExactMoveCounterV6B() {
    // v6B 改用快速分解估計，而不是完整 DFS；避免測試 500/1000 局時速度過慢。
    const memo = new Map();
    return (hand) => estimatePartitionCountV6B(hand, memo);
}

function estimatePartitionCountV6B(hand, memo) {
    if (!hand || hand.length === 0) return 0;
    const key = hand.map(c => c.value).sort((a, b) => a - b).join(',');
    if (memo.has(key)) return memo.get(key);
    if (canBeOneMove(hand)) { memo.set(key, 1); return 1; }
    if (hand.length <= 6 && canFinishInTwoMovesV5(hand)) { memo.set(key, 2); return 2; }

    const baseline = estimateMoveCountLite(hand);
    let remaining = [...hand];
    let count = 0;

    // 貪婪分解：每次取一個較大的、較像完整牌型的出牌包。
    // 這不是完美 solver，但速度快，足夠用來比較「這手是否破壞路線」。
    while (remaining.length > 0) {
        if (canBeOneMove(remaining)) { count += 1; break; }
        const moves = generateAllMoves(remaining)
            .filter(m => m.cards.length >= 2)
            .sort((a, b) => partitionMovePriorityV6B(b) - partitionMovePriorityV6B(a));
        if (moves.length === 0) {
            count += remaining.length;
            break;
        }
        const chosen = moves[0];
        remaining = remaining.filter(c => !chosen.cards.includes(c));
        count += 1;
        if (count >= baseline + 2) break;
    }

    const result = Math.min(count, baseline + 1);
    memo.set(key, result);
    return result;
}

function partitionMovePriorityV6B(move) {
    const p = move.pattern;
    let score = move.cards.length * 100;
    if (p.len === 5) score += 180 + (p.comboRank || 0) * 20;
    if (p.type === 'pair') score += 30;
    if (p.type === 'triple') score += 40;
    // 分解時不希望過早把 2 / A 塞進普通同花，略扣。
    const controlUsed = move.cards.filter(c => c.rank === '2' || c.rank === 'A').length;
    if (p.len === 5 && p.comboRank <= FIVE_CARD_POWER.flush) score -= controlUsed * 25;
    score -= getStrengthCost(p) * 0.08;
    return score;
}

function getOpponentResponseInfoLite(move, state) {
    let opponentsCanBeat = 0;
    let minResponseCost = Infinity;
    for (const opponent of state.opponents) {
        if (!opponent || opponent.hand.length === 0) continue;
        const replies = generateLegalMoves(opponent.hand, move.pattern, false, -1);
        if (replies.length > 0) opponentsCanBeat += 1;
        for (const reply of replies) minResponseCost = Math.min(minResponseCost, getStrengthCost(reply.pattern));
    }
    if (!Number.isFinite(minResponseCost)) minResponseCost = 0;
    return { opponentsCanBeat, minResponseCost };
}

function canFinishInTwoMovesV5(hand) {
    if (!hand || hand.length === 0) return true;
    if (hand.length > 8) return false;
    const moves = generateAllMoves(hand);
    for (const m of moves) {
        const remain = hand.filter(c => !m.cards.includes(c));
        if (canBeOneMove(remain)) return true;
    }
    return false;
}

function normalizeAIScoreV5(score) {
    if (score > 1200) return 1200 + Math.sqrt(score - 1200) * 16;
    if (score < -1200) return -1200 - Math.sqrt(-1200 - score) * 16;
    return score;
}

function rolloutAfterCandidateV5(candidateMove, state, maxSteps = 180) {
    const hands = players.map(p => [...p.hand]);
    let table = lastPlayedCards ? { ...lastPlayedCards } : null;
    let first = isFirstRound;
    let passN = passCount;
    let cur = state.playerIdx;
    const me = state.playerIdx;

    function removeCardsFromLocal(hand, cards) {
        return hand.filter(c => !cards.includes(c));
    }

    function applyMoveLocal(playerIdx, move) {
        hands[playerIdx] = removeCardsFromLocal(hands[playerIdx], move.cards);
        table = { ...move.pattern, owner: playerIdx };
        passN = 0;
        first = false;
    }

    applyMoveLocal(me, candidateMove);
    if (hands[me].length === 0) return { winner: me, myRemain: 0, minOppRemain: Math.min(...hands.filter((_,i)=>i!==me).map(h=>h.length)) };
    cur = (me + 1) % numPlayers;

    for (let step = 0; step < maxSteps; step++) {
        const legal = generateRolloutLegalMovesV10(hands[cur], table, first, startCardValue);
        let move = null;
        if (legal.length > 0) move = chooseRolloutMoveV5(legal, hands, cur, table, first);

        // Rollout 裏面，非強制情況可以 Pass。這裏用保守閾值避免模擬時所有人亂跟。
        if (!move && table && !first) {
            passN += 1;
            if (passN >= numPlayers - 1) {
                table = null;
                passN = 0;
            }
        } else if (move) {
            applyMoveLocal(cur, move);
            if (hands[cur].length === 0) {
                return { winner: cur, myRemain: hands[me].length, minOppRemain: Math.min(...hands.filter((_,i)=>i!==me).map(h=>h.length)) };
            }
        } else {
            // 理論上只會在第一手無合法牌時出現，保險處理。
            passN += 1;
        }
        cur = (cur + 1) % numPlayers;
    }
    return { winner: -1, myRemain: hands[me].length, minOppRemain: Math.min(...hands.filter((_,i)=>i!==me).map(h=>h.length)) };
}

function chooseRolloutMoveV5(legal, hands, cur, table, first) {
    let best = null;
    let bestScore = -Infinity;
    const hand = hands[cur];
    const beforePlan = estimateMoveCountLite(hand);
    for (const m of legal) {
        const after = hand.filter(c => !m.cards.includes(c));
        if (after.length === 0) return m;
        const pat = m.pattern;
        let score = 0;
        score += (beforePlan - estimateMoveCountLite(after)) * 120;
        score += m.cards.length * 28;
        score -= getStrengthCost(pat) * 0.65;
        if (after.length <= 5 && canBeOneMove(after)) score += 450;
        if (after.length <= 6 && canFinishInTwoMoves(after)) score += 240;
        if (!table) {
            const rank = Math.floor(pat.val / 4);
            if (pat.type === 'single' && rank <= VALUES['8']) score += 35;
            if (pat.type === 'pair' && rank <= VALUES['10']) score += 35;
            if (pat.type === 'single' && rank >= VALUES['K'] && after.length > 2) score -= 90;
        }
        if (score > bestScore) { bestScore = score; best = m; }
    }
    // 跟牌時如果最佳出牌仍很差，就選擇 Pass。
    if (table && !first && bestScore < -20) return null;
    return best;
}

function buildAIState(playerIdx) {
    const nextIdx = (playerIdx + 1) % numPlayers;
    const opponents = players.filter(p => p.id !== playerIdx);
    const myHandCount = players[playerIdx].hand.length;
    const lowestOpponentCards = Math.min(...opponents.map(p => p.hand.length));
    const lastOwnerCards = lastPlayedCards && players[lastPlayedCards.owner] ? players[lastPlayedCards.owner].hand.length : 99;
    const lag = myHandCount - lowestOpponentCards;
    const controlCards = countControlCards(players[playerIdx].hand);
    const openingPlanV8C = players[playerIdx].openingPlanV8C || evaluateOpeningHandV8C(players[playerIdx].hand);
    return {
        playerIdx,
        aiVersion: AI_VERSION_BY_PLAYER[playerIdx] || 'v3_baseline',
        profile: AI_PROFILES[playerIdx] || AI_PROFILES[0],
        hand: players[playerIdx].hand,
        myHandCount,
        nextPlayerHandCount: players[nextIdx].hand.length,
        opponents,
        lowestOpponentCards,
        lag,
        lagMode: lag >= 5,
        severeLagMode: lag >= 7,
        controlCards,
        openingPlanV8C,
        anyOpponentLastCard: opponents.some(p => p.hand.length === 1),
        anyOpponentTwoCards: opponents.some(p => p.hand.length === 2),
        lastOwnerCards,
        openingControlOwner,
        openingControlStreak,
        opponentControlStreak: openingControlOwner !== playerIdx && openingControlStreak >= 2,
        danger: calculateDangerLevel(playerIdx),
        isFollowing: !!lastPlayedCards,
        isOpening: !lastPlayedCards,
        isFirstRound
    };
}

function calculateDangerLevel(playerIdx) {
    let danger = 0;
    const nextIdx = (playerIdx + 1) % numPlayers;
    players.forEach(p => {
        if (p.id === playerIdx) return;
        if (p.hand.length === 1) danger += 210;
        else if (p.hand.length === 2) danger += 120;
        else if (p.hand.length === 3) danger += 55;
        else if (p.hand.length === 4) danger += 20;
    });
    if (players[nextIdx].hand.length === 1) danger += 210;
    if (players[nextIdx].hand.length === 2) danger += 70;
    if (players[playerIdx].hand.length <= 5) danger += 45;
    if (lastPlayedCards && lastPlayedCards.owner === nextIdx) danger += 35;
    return danger;
}

function scorePassV3(state) {
    let score = 18;

    // v3：Pass 仍可用，但落後或有人快出完時要明顯更不願意 Pass。
    score -= state.danger * 1.65;
    score -= state.profile.aggression * 18;

    if (state.hand.length >= 8) score -= 45;
    if (state.hand.length >= 11) score -= 85;
    if (state.hand.length <= 4) score -= 85;

    if (state.lagMode) score -= 120 + state.lag * 18;
    if (state.severeLagMode) score -= 90;
    if (state.anyOpponentLastCard) score -= 230;
    if (state.anyOpponentTwoCards) score -= 115;
    if (state.lastOwnerCards <= 2) score -= 150;
    else if (state.lastOwnerCards <= 4) score -= 70;

    // 面對高牌可以保留資源，但不能壓過尾局危險與落後補救。
    if (!state.lagMode && lastPlayedCards && lastPlayedCards.type === 'single' && lastPlayedCards.val >= VALUES.A * 4) score += 28;
    if (!state.lagMode && lastPlayedCards && lastPlayedCards.type === 'pair' && Math.floor(lastPlayedCards.val / 4) >= VALUES.K) score += 22;
    if (!state.lagMode && lastPlayedCards && lastPlayedCards.len === 5 && lastPlayedCards.comboRank >= FIVE_CARD_POWER.fullhouse) score += 30;

    return score;
}

function scorePass(state) {
    const base = scorePassV3(state);
    if (state.aiVersion !== 'v5_challenger' && state.aiVersion !== 'v6b_challenger' && state.aiVersion !== 'v7_challenger') return base;

    let score = base;

    // v4：新版 AI 更不願意在便宜牌、危急牌局、自己落後時 Pass。
    if (state.anyOpponentLastCard) score -= 150;
    if (state.anyOpponentTwoCards) score -= 105;
    if (state.lowestOpponentCards <= 3) score -= 65;
    if (state.lag >= 3) score -= 55 + state.lag * 12;
    if (state.lag >= 6) score -= 80;
    if (state.myHandCount >= 8) score -= 35;

    if (lastPlayedCards) {
        const rank = Math.floor(lastPlayedCards.val / 4);
        if (lastPlayedCards.type === 'single' && rank <= VALUES['J']) score -= 32;
        if (lastPlayedCards.type === 'pair' && rank <= VALUES['10']) score -= 40;
        if (lastPlayedCards.owner !== state.playerIdx && state.lastOwnerCards <= 2) score -= 115;
    }

    return score;
}


function scoreMove(move, state) {
    if (state.aiVersion === 'v4_challenger') return scoreMoveV4(move, state);
    return scoreMoveV3(move, state);
}

function scoreMoveV4(move, state) {
    const originalHand = state.hand;
    const afterHand = originalHand.filter(c => !move.cards.includes(c));
    const pat = move.pattern;

    const base = scoreMoveV3(move, state);
    if (base >= 99999) return base;

    let score = base;
    const beforePlan = estimateMoveCountLite(originalHand);
    const afterPlan = estimateMoveCountLite(afterHand);
    const planGain = beforePlan - afterPlan;

    // 新版核心：不是只看出幾張，而是看「離出完還要幾手」。
    score += planGain * 58;
    if (afterPlan <= 2) score += 95;
    if (afterPlan <= 3 && afterHand.length <= 7) score += 45;
    if (afterHand.length <= 6 && canFinishInTwoMoves(afterHand)) score += 80;

    // 尾局封殺：任一對手剩 1/2 張都更積極，不只看下家。
    if (state.anyOpponentLastCard) {
        if (state.isFollowing) score += 190;
        if (pat.type === 'single') score += 80;
        if (state.isOpening && pat.type !== 'single') score -= 45;
    }

    if (state.anyOpponentTwoCards) {
        if (pat.type === 'pair') score += 145;
        if (state.isOpening && pat.type === 'single') score -= 48;
        if (state.isFollowing) score += 65;
    }

    if (state.lastOwnerCards <= 2 && state.isFollowing) score += 135;
    if (state.lastOwnerCards <= 3 && state.isFollowing) score += 55;

    // 落後救援：新版 AI 在自己牌太多時更願意拆牌搶權。
    if (state.lag >= 4) {
        score += move.cards.length * 24 + state.lag * 15;
        if (state.isFollowing) score += 80;
        if (pat.len === 5) score += 38;
    }
    if (state.lag >= 7) score += 95;

    // 控制牌：A/2/大牌仍重要；不在危急或兩手可完時，避免太早亂燒。
    const hasTwo = move.cards.some(c => c.rank === '2');
    const usesManyControls = move.cards.filter(c => c.rank === '2' || c.rank === 'A' || c.rankVal >= VALUES['K']).length;
    const urgent = state.anyOpponentLastCard || state.anyOpponentTwoCards || state.lagMode || afterPlan <= 2;
    if (!urgent && originalHand.length >= 8) {
        if (hasTwo) score -= 55;
        if (usesManyControls >= 2) score -= 35;
    }
    if (urgent && hasTwo && state.isFollowing) score += 45;

    // 主動開新輪時：優先開能讓自己「下一手順」的牌；避免單純丟很大的單張。
    if (state.isOpening) {
        if (pat.type === 'pair' && state.anyOpponentTwoCards) score += 75;
        if (pat.type === 'single' && Math.floor(pat.val / 4) >= VALUES['K'] && afterPlan > 2) score -= 65;
        if (pat.len === 5 && afterPlan <= 3) score += 55;
    }

    // 如果出完後完全沒有控制牌，且不是快完，稍扣分。
    const controlAfter = countControlCards(afterHand);
    if (controlAfter === 0 && afterHand.length >= 4 && afterPlan > 2) score -= 40;
    else score += Math.min(controlAfter, 3) * 10;

    // 第一手仍要避免為了帶 ♦3 把頂級炸彈直接送出去，除非形狀大幅改善。
    if (state.isFirstRound && pat.len === 5 && pat.comboRank >= FIVE_CARD_POWER.fullhouse && afterPlan > 3) {
        score -= 70;
    }

    return normalizeAIScoreV4(score);
}

function estimateMoveCountLite(hand) {
    if (!hand || hand.length === 0) return 0;
    if (canBeOneMove(hand)) return 1;
    if (hand.length <= 6 && canFinishInTwoMoves(hand)) return 2;

    const counts = [...getRankCounts(hand).values()].sort((a, b) => b - a);
    let cards = hand.length;
    let moves = 0;

    // 粗略估計葫蘆 / 鐵支作為一手清五張。
    let triples = counts.filter(c => c >= 3).length;
    let pairs = counts.filter(c => c >= 2).length;
    while (triples > 0 && pairs > 1 && cards >= 5) {
        moves += 1;
        cards -= 5;
        triples -= 1;
        pairs -= 2;
    }

    // 剩餘對子作一手；其餘孤張各一手。這是保守估計，不追求完美，只供 AI 評分。
    const remainingPairs = Math.max(0, Math.floor(cards / 2) - Math.max(0, cards - 6));
    moves += remainingPairs;
    cards -= remainingPairs * 2;
    moves += cards;

    return Math.max(1, moves);
}

function normalizeAIScoreV4(score) {
    if (score > 650) return 650 + Math.sqrt(score - 650) * 10;
    if (score < -650) return -650 - Math.sqrt(-650 - score) * 10;
    return score;
}

function scoreMoveV3(move, state) {
    const originalHand = state.hand;
    const afterHand = originalHand.filter(c => !move.cards.includes(c));
    const pat = move.pattern;
    const profile = state.profile;

    if (afterHand.length === 0) return 100000;

    let score = 0;
    score += move.cards.length * 30;
    score += profile.aggression * 14;
    if (pat.len === 5) score += (pat.comboRank || 0) * 34;
    if (pat.type === 'triple') score += testAllowTriples ? 14 : -9999;
    if (pat.type === 'pair') score += 14;

    score += finishPotentialBonus(afterHand);
    score += evaluateHandShapeFast(afterHand) * 0.32;
    score -= estimateThreatPenalty(move, state);

    const breakPenalty = calculateBreakPenalty(move, originalHand);
    const dangerReduction = Math.min(0.68, state.danger / 650);
    const lagReduction = state.lagMode ? Math.min(0.45, state.lag * 0.055) : 0;
    score -= breakPenalty * (1 - profile.breakTolerance * 0.50) * (1 - dangerReduction) * (1 - lagReduction);

    score -= getStrengthCost(pat) * 0.82;

    const hasTwo = move.cards.some(c => c.rank === '2');
    if (hasTwo && originalHand.length > 5 && state.danger < 170 && !state.lagMode) score -= 82 * profile.conserveTwo;
    if (hasTwo && state.lagMode && state.isFollowing) score += 22;

    if (state.nextPlayerHandCount === 1 && state.isFollowing) {
        score += 270;
        if (pat.type === 'single') score += 95;
    }
    if (state.anyOpponentLastCard && state.isFollowing) score += 165;
    if (state.anyOpponentTwoCards && state.isFollowing) score += 75;
    if (state.lastOwnerCards <= 2 && state.isFollowing) score += 125;
    if (state.danger >= 180 && state.isFollowing) score += state.danger * 0.45;

    // 落後模式：自己剩牌明顯多於對手時，優先搶回牌權與減少手牌數。
    if (state.lagMode) {
        score += move.cards.length * 18 + state.lag * 12;
        if (state.isFollowing) score += 70;
        if (pat.len === 5) score += 25;
    }
    if (state.severeLagMode) score += 55;

    if (state.isOpening) score += openingMoveBonus(move, afterHand, state);
    if (state.isFirstRound) {
        score += 70;
        score -= getStrengthCost(pat) * 0.30;
        score -= openingStrongComboPenalty(move, afterHand, state);
    }

    score += aiTinyRandom() * 2.5;
    return normalizeAIScore(score);
}

function openingMoveBonus(move, afterHand, state) {
    let score = 0;

    // v3：主動開新輪較重視清牌效率，但避免中段分數爆炸。
    if (move.cards.length === 5) score += 48;
    if (move.cards.length === 3 && testAllowTriples) score += 16;
    if (move.cards.length === 2) score += 26;
    if (move.cards.length === 1 && Math.floor(move.pattern.val / 4) <= VALUES['7']) score += 30;

    if (afterHand.length <= 2) score += 190;
    if (afterHand.length <= 6 && canBeOneMove(afterHand)) score += 210;
    if (state.lowestOpponentCards <= 2) score += 75;
    if (state.lagMode) score += 55 + state.lag * 9;

    if (move.pattern.type === 'single' && Math.floor(move.pattern.val / 4) >= VALUES.A && state.hand.length > 4 && !state.lagMode) score -= 78;
    return score;
}

function openingStrongComboPenalty(move, afterHand, state) {
    const pat = move.pattern;
    if (!state.isFirstRound) return 0;
    if (afterHand.length <= 3 || canFinishInTwoMoves(afterHand)) return 0;

    let penalty = 0;

    // 第一手必須帶起始牌，但 v2 不希望 AI 經常用 3 直接砸葫蘆、鐵支、同花順。
    if (pat.len === 5) {
        if (pat.comboRank === FIVE_CARD_POWER.straight) penalty += 30;
        if (pat.comboRank === FIVE_CARD_POWER.flush) penalty += 120;
        if (pat.comboRank === FIVE_CARD_POWER.fullhouse) penalty += 300;
        if (pat.comboRank === FIVE_CARD_POWER.fourkind) penalty += 520;
        if (pat.comboRank === FIVE_CARD_POWER.straightflush) penalty += 420;
        if (move.cards.some(c => c.rank === '2')) penalty += 180;
    }

    if (pat.type === 'pair' && move.cards.some(c => c.rank === '2')) penalty += 120;
    return penalty;
}

function finishPotentialBonus(afterHand) {
    let score = 0;
    if (afterHand.length === 1) score += 220;
    if (afterHand.length === 2) score += 150;
    if (afterHand.length === 3) score += 90;
    if (afterHand.length <= 5 && canBeOneMove(afterHand)) score += 360;
    if (afterHand.length <= 6 && canFinishInTwoMoves(afterHand)) score += 175;
    return score;
}

function evaluateHandShapeFast(hand) {
    if (hand.length === 0) return 1000;
    const counts = getRankCounts(hand);
    let pairs = 0, triples = 0, quads = 0, singles = 0;
    for (const count of counts.values()) {
        if (count === 1) singles++;
        if (count >= 2) pairs++;
        if (count >= 3) triples++;
        if (count >= 4) quads++;
    }

    let score = 0;
    score += quads * 125;
    score += triples * (testAllowTriples ? 42 : 20);
    score += pairs * 30;
    score -= singles * 12;
    score += countTwos(hand) * 38;
    score += estimateStraightPotential(hand) * 15;
    score += estimateFlushPotential(hand) * 11;
    if (hand.length <= 5 && canBeOneMove(hand)) score += 300;
    if (hand.length <= 6 && canFinishInTwoMoves(hand)) score += 115;
    score -= hand.length * 7;
    return score;
}

function calculateBreakPenalty(move, originalHand) {
    if (move.cards.length >= 5) return 0;
    const rankCounts = getRankCounts(originalHand);
    let penalty = 0;
    for (const card of move.cards) {
        const count = rankCounts.get(card.rankVal) || 0;
        if (move.cards.length === 1) {
            if (count === 2) penalty += 50;
            if (count === 3) penalty += 95;
            if (count === 4) penalty += 150;
        } else if (move.cards.length === 2) {
            if (count === 3) penalty += 58;
            if (count === 4) penalty += 105;
        } else if (move.cards.length === 3) {
            if (count === 4) penalty += 75;
        }
    }
    return penalty;
}

function estimateThreatPenalty(move, state) {
    const pat = move.pattern;
    let unknownThreats = 0;
    if (pat.len === 1 || pat.len === 2 || pat.len === 3) {
        const startRank = Math.floor(pat.val / 4) + 1;
        for (let r = startRank; r <= 12; r++) {
            let unknownOfRank = 0;
            for (let s = 0; s < 4; s++) {
                const v = r * 4 + s;
                const inMyHand = state.hand.some(c => c.value === v);
                if (!playedValues.has(v) && !inMyHand) unknownOfRank++;
            }
            if (pat.len === 1 && unknownOfRank >= 1) unknownThreats += unknownOfRank;
            if (pat.len === 2 && unknownOfRank >= 2) unknownThreats += 2;
            if (pat.len === 3 && unknownOfRank >= 3) unknownThreats += 3;
        }
    }
    if (pat.len === 5) {
        for (const p of state.opponents) if (p.hand.length >= 5) unknownThreats += 2.5;
        if (pat.comboRank >= FIVE_CARD_POWER.fullhouse) unknownThreats -= 2;
        if (pat.comboRank >= FIVE_CARD_POWER.fourkind) unknownThreats -= 3;
    }
    unknownThreats = Math.max(0, unknownThreats - passMemoryReduction(pat, state));
    return unknownThreats * (state.isOpening ? 4.5 : 3.2);
}

function passMemoryReduction(pattern, state) {
    let reduction = 0;
    for (const p of state.opponents) {
        const mem = playerMemory[p.id];
        if (!mem) continue;
        for (const pass of mem.passes) {
            if (pass.len !== pattern.len) continue;
            if (pattern.len === 5) {
                if (pass.comboRank <= pattern.comboRank) reduction += 0.5;
            } else if (pass.type === pattern.type && pass.val <= pattern.val) {
                reduction += 1.2;
            }
        }
    }
    return reduction;
}

function normalizeAIScore(score) {
    if (score > 520) return 520 + Math.sqrt(score - 520) * 12;
    if (score < -520) return -520 - Math.sqrt(-520 - score) * 12;
    return score;
}

function countControlCards(cards) {
    return cards.filter(c => c.rank === '2' || c.rank === 'A' || c.value >= VALUES.K * 4 + 2).length;
}

function getStrengthCost(pattern) {
    if (!pattern) return 999;
    const rank = Math.floor(pattern.val / 4);
    if (pattern.len === 1) return rank * 7 + (pattern.val % 4) * 1.5;
    if (pattern.len === 2) return rank * 8;
    if (pattern.len === 3) return rank * 9;
    if (pattern.len === 5) return (pattern.comboRank || 0) * 12 + rank * 5;
    return 0;
}

function canBeOneMove(hand) {
    if (hand.length === 0) return true;
    return analyzePattern(hand) !== null;
}

function canFinishInTwoMoves(hand) {
    if (hand.length === 0) return true;
    if (hand.length > 6) return false;
    const moves = generateAllMoves(hand);
    for (const m of moves) {
        const remain = hand.filter(c => !m.cards.includes(c));
        if (canBeOneMove(remain)) return true;
    }
    return false;
}


function cancelCenterClearTimer() {
    if (centerClearTimer) {
        clearTimeout(centerClearTimer);
        centerClearTimer = null;
    }
}

function scheduleCenterClearForEmptyTable() {
    cancelCenterClearTimer();
    centerClearTimer = setTimeout(() => {
        // 防止上一輪的延遲清桌，把下一輪已經打出的新牌也清掉。
        if (lastPlayedCards === null) {
            const center = byId('center-area');
            if (center) center.innerHTML = '';
        }
        centerClearTimer = null;
    }, 600);
}

function updateOpeningControlStreak(playerIdx) {
    if (openingControlOwner === playerIdx) {
        openingControlStreak += 1;
    } else {
        openingControlOwner = playerIdx;
        openingControlStreak = 1;
    }
}

function playCards(playerIdx, cards, pattern, silent) {
    stopCountdown();
    cancelCenterClearTimer();
    const p = players[playerIdx];
    const sortedCards = [...cards].sort((a, b) => a.value - b.value);
    const displayCards = sortCardsForDisplay(cards, pattern);
    const wasOpeningRound = !lastPlayedCards;

    if (testMode) logTestPlay(playerIdx, displayCards, pattern);

    cards.forEach(c => c.selected = false);
    p.hand = p.hand.filter(c => !cards.includes(c));
    cards.forEach(c => playedValues.add(c.value));

    if (!silent) {
        renderCenterCards(displayCards);
    }

    if (p.hand.length === 0) {
        gameActive = false;
        if (testMode) handleTestGameOver(playerIdx);
        else handleNormalGameOver(playerIdx);
        return;
    }

    if (wasOpeningRound) updateOpeningControlStreak(playerIdx);

    lastPlayedCards = { ...pattern, owner: playerIdx, cardsText: formatCards(displayCards) };
    passCount = 0;
    if (isFirstRound) isFirstRound = false;
    currentPlayer = (currentPlayer + 1) % numPlayers;
    if (!silent) checkTurn();
}


function countTwosInHand(hand) {
    return hand.filter(c => c.rank === '2').length;
}

function calculatePenaltyForHand(hand) {
    const remain = hand.length;
    if (remain <= 0) return 0;
    const twoCount = countTwosInHand(hand);
    const manyCardsMultiplier = remain >= 9 ? 2 : 1;
    const twoMultiplier = Math.pow(2, twoCount);
    return remain * manyCardsMultiplier * twoMultiplier;
}

function calculateRoundScoreDeltas(winnerIdx) {
    const deltas = new Array(numPlayers).fill(0);
    const details = [];
    let winnerGain = 0;

    players.forEach(p => {
        if (p.id === winnerIdx) return;
        const remain = p.hand.length;
        const twoCount = countTwosInHand(p.hand);
        const manyCardsMultiplier = remain >= 9 ? 2 : 1;
        const twoMultiplier = Math.pow(2, twoCount);
        const penalty = calculatePenaltyForHand(p.hand);
        deltas[p.id] -= penalty;
        winnerGain += penalty;
        details.push({
            playerIdx: p.id,
            name: p.name,
            remain,
            twoCount,
            manyCardsMultiplier,
            twoMultiplier,
            penalty
        });
    });

    deltas[winnerIdx] += winnerGain;
    return { winnerIdx, winnerGain, deltas, details };
}

function formatRoundScoreDetails(scoreInfo) {
    if (!scoreInfo || !scoreInfo.details) return [];
    return scoreInfo.details.map(d => {
        const parts = [`${d.name}：${d.remain}張`];
        if (d.remain >= 9) parts.push('9張以上x2');
        if (d.twoCount > 0) parts.push(`老2 ${d.twoCount}張x${d.twoMultiplier}`);
        parts.push(`扣 ${d.penalty}`);
        return parts.join('，');
    });
}

function toggleScoreboardCollapse() {
    scoreboardCollapsed = !scoreboardCollapsed;
    updateScoreboard();
}

function updateScoreboard() {
    const board = byId('scoreboard-panel');
    if (!board) return;
    if (!matchScores || matchScores.length === 0) {
        board.innerHTML = '';
        board.classList.remove('collapsed');
        return;
    }

    const maxScore = Math.max(...matchScores);
    const leaderIndexes = matchScores
        .map((score, idx) => ({ score, idx }))
        .filter(item => item.score === maxScore)
        .map(item => item.idx);
    const leaderText = leaderIndexes.length === numPlayers
        ? '無'
        : leaderIndexes.map(idx => PLAYER_NAMES[idx]).join('、');

    board.classList.toggle('collapsed', scoreboardCollapsed);

    const rows = matchScores.map((score, idx) => {
        const isLeader = score === maxScore;
        const delta = matchLastRoundDeltas && typeof matchLastRoundDeltas[idx] === 'number' && matchLastRoundDeltas[idx] !== 0
            ? ` <span class="score-delta" style="color:${matchLastRoundDeltas[idx] > 0 ? '#8fff8f' : '#ff9b9b'}">(${matchLastRoundDeltas[idx] > 0 ? '+' : ''}${matchLastRoundDeltas[idx]})</span>`
            : '';
        return `<div class="score-row"><span class="${isLeader ? 'leader' : ''}">${idx + 1}. ${PLAYER_NAMES[idx]}</span><span class="score-value">${score}${delta}</span></div>`;
    }).join('');

    if (scoreboardCollapsed) {
        board.innerHTML = `
            <div class="scoreboard-header">
                <h3>積分榜</h3>
                <button type="button" id="score-toggle-btn" class="score-toggle-btn">展開</button>
            </div>
            <div class="score-compact-line">第 ${matchRoundPlayed}/${matchTargetRounds} 局｜領先：${leaderText}${leaderText === '無' ? '' : ` ${maxScore}`}</div>
        `;
        return;
    }

    board.innerHTML = `
        <div class="scoreboard-header">
            <h3>積分榜</h3>
            <button type="button" id="score-toggle-btn" class="score-toggle-btn">收起</button>
        </div>
        <div class="score-note">第 ${matchRoundPlayed}/${matchTargetRounds} 局｜領先：${leaderText}</div>
        ${rows}
        <div class="score-note">計分：9張以上 x2；每張老2再 x2</div>
    `;
}

function escapeHtml(text) {

        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')

}

function getStraightInfo(sortedCards, uniqueRanks) {
    // 順子規則：A 只可作順頭或順尾。
    // 合法：34567 < 45678 < ... < 10JQKA < 23456 < A2345。
    // 不合法：JQKA2、QKA23、KA234。
    if (uniqueRanks.length !== 5) return null;
    const key = uniqueRanks.join(',');
    let order = -1;
    let tieRank = -1;

    // A2345：最大順。tie 用 5 的花色。
    if (key === [VALUES['3'], VALUES['4'], VALUES['5'], VALUES['A'], VALUES['2']].join(',')) {
        order = 9;
        tieRank = VALUES['5'];
    }
    // 23456：第二大順。tie 用 6 的花色。
    else if (key === [VALUES['3'], VALUES['4'], VALUES['5'], VALUES['6'], VALUES['2']].join(',')) {
        order = 8;
        tieRank = VALUES['6'];
    }
    // 一般順：34567 到 10JQKA。order 0..7。
    else if (uniqueRanks[4] !== VALUES['2'] && uniqueRanks[4] - uniqueRanks[0] === 4) {
        order = uniqueRanks[0];
        tieRank = uniqueRanks[4];
    } else {
        return null;
    }

    const tieCards = sortedCards.filter(c => c.rankVal === tieRank).sort((a, b) => a.suitIdx - b.suitIdx);
    const tieSuit = tieCards.length ? tieCards[tieCards.length - 1].suitIdx : 0;
    return { order, value: order * 4 + tieSuit };
}

function analyzePattern(cards) {
    const sorted = [...cards].sort((a, b) => a.value - b.value);
    const len = sorted.length;
    const ranks = sorted.map(c => c.rankVal);

    if (len === 1) return { type: 'single', len, val: sorted[0].value, comboRank: 0 };
    if (len === 2 && ranks[0] === ranks[1]) return { type: 'pair', len, val: sorted[1].value, comboRank: 0 };
    if (len === 3 && ranks[0] === ranks[1] && ranks[1] === ranks[2]) {
        return testAllowTriples ? { type: 'triple', len, val: sorted[2].value, comboRank: 0 } : null;
    }
    if (len !== 5) return null;

    const rankCounts = new Map();
    const suitCounts = new Map();
    for (const c of sorted) {
        rankCounts.set(c.rankVal, (rankCounts.get(c.rankVal) || 0) + 1);
        suitCounts.set(c.suitIdx, (suitCounts.get(c.suitIdx) || 0) + 1);
    }

    const uniqueRanks = [...rankCounts.keys()].sort((a, b) => a - b);
    const isFlush = suitCounts.size === 1;
    const straightInfo = getStraightInfo(sorted, uniqueRanks);
    const isStraight = !!straightInfo;

    if (isStraight && isFlush) return { type: 'straightflush', len, val: straightInfo.value, straightOrder: straightInfo.order, comboRank: FIVE_CARD_POWER.straightflush };

    let fourRank = null, tripleRank = null, pairRank = null;
    for (const [rank, count] of rankCounts.entries()) {
        if (count === 4) fourRank = rank;
        if (count === 3) tripleRank = rank;
        if (count === 2) pairRank = rank;
    }

    if (fourRank !== null) {
        const quadCards = sorted.filter(c => c.rankVal === fourRank);
        return { type: 'fourkind', len, val: quadCards[quadCards.length - 1].value, comboRank: FIVE_CARD_POWER.fourkind };
    }
    if (tripleRank !== null && pairRank !== null) {
        const trioCards = sorted.filter(c => c.rankVal === tripleRank);
        return { type: 'fullhouse', len, val: trioCards[trioCards.length - 1].value, comboRank: FIVE_CARD_POWER.fullhouse };
    }
    if (isFlush) return { type: 'flush', len, val: sorted[4].value, comboRank: FIVE_CARD_POWER.flush };
    if (isStraight) return { type: 'straight', len, val: straightInfo.value, straightOrder: straightInfo.order, comboRank: FIVE_CARD_POWER.straight };
    return null;
}

function canBeat(newPat, oldPat) {
    if (!newPat || !oldPat) return false;
    if (newPat.len !== oldPat.len) return false;
    if (newPat.len === 5 && oldPat.len === 5) {
        if (newPat.comboRank !== oldPat.comboRank) return newPat.comboRank > oldPat.comboRank;
        return newPat.val > oldPat.val;
    }
    if (newPat.type !== oldPat.type) return false;
    return newPat.val > oldPat.val;
}

function isValidMove(newPat, cards) {
    if (!newPat) return false;
    if (isFirstRound && !cards.some(c => c.value === startCardValue)) return false;
    if (!lastPlayedCards) return true;
    return canBeat(newPat, lastPlayedCards);
}

function generateLegalMoves(hand, tablePattern, firstRound, requiredCardValue) {
    return generateAllMoves(hand).filter(move => {
        if (firstRound && !move.cards.some(c => c.value === requiredCardValue)) return false;
        if (!tablePattern) return true;
        return canBeat(move.pattern, tablePattern);
    }).sort((a, b) => {
        if (a.cards.length !== b.cards.length) return b.cards.length - a.cards.length;
        if ((a.pattern.comboRank || 0) !== (b.pattern.comboRank || 0)) return (b.pattern.comboRank || 0) - (a.pattern.comboRank || 0);
        return a.pattern.val - b.pattern.val;
    });
}

function generateAllMoves(hand) {
    const sorted = [...hand].sort((a, b) => a.value - b.value);
    const moves = [];
    const groups = groupByRank(sorted);

    for (const c of sorted) moves.push({ cards: [c], pattern: analyzePattern([c]) });

    for (const group of groups.values()) {
        if (group.length >= 2) {
            for (const pair of combinations(group, 2)) moves.push({ cards: pair, pattern: analyzePattern(pair) });
        }
        if (group.length >= 3) {
            for (const triple of combinations(group, 3)) moves.push({ cards: triple, pattern: analyzePattern(triple) });
        }
    }

    if (sorted.length >= 5) {
        for (const five of combinations(sorted, 5)) {
            const pat = analyzePattern(five);
            if (pat) moves.push({ cards: five, pattern: pat });
        }
    }

    return dedupeMoves(moves).filter(m => m.pattern !== null);
}



function generateFiveCardMoves(hand) {
    const sorted = [...hand].sort((a, b) => a.value - b.value);
    const moves = [];
    if (sorted.length < 5) return moves;
    for (const five of combinations(sorted, 5)) {
        const pat = analyzePattern(five);
        if (pat && pat.len === 5) moves.push({ cards: five, pattern: pat });
    }
    return dedupeMoves(moves);
}

function dedupeMoves(moves) {
    const seen = new Set();
    const out = [];
    for (const m of moves) {
        if (!m.pattern) continue;
        const key = m.cards.map(c => c.value).sort((a, b) => a - b).join('-');
        if (seen.has(key)) continue;
        seen.add(key);
        out.push(m);
    }
    return out;
}

function combinations(arr, k, start = 0, path = [], res = []) {
    if (path.length === k) {
        res.push([...path]);
        return res;
    }
    for (let i = start; i <= arr.length - (k - path.length); i++) {
        path.push(arr[i]);
        combinations(arr, k, i + 1, path, res);
        path.pop();
    }
    return res;
}

function groupByRank(cards) {
    const map = new Map();
    for (const c of cards) {
        if (!map.has(c.rankVal)) map.set(c.rankVal, []);
        map.get(c.rankVal).push(c);
    }
    return map;
}

function getRankCounts(cards) {
    const map = new Map();
    for (const c of cards) map.set(c.rankVal, (map.get(c.rankVal) || 0) + 1);
    return map;
}

function countTwos(cards) {
    return cards.filter(c => c.rank === '2').length;
}

function estimateStraightPotential(cards) {
    const ranks = [...new Set(cards.map(c => c.rankVal).filter(v => v < VALUES['2']))].sort((a, b) => a - b);
    let best = 0;
    let run = 1;
    for (let i = 1; i < ranks.length; i++) {
        if (ranks[i] === ranks[i - 1] + 1) run++;
        else run = 1;
        best = Math.max(best, run);
    }
    return best >= 3 ? best : 0;
}

function estimateFlushPotential(cards) {
    const counts = [0, 0, 0, 0];
    cards.forEach(c => counts[c.suitIdx]++);
    return Math.max(...counts);
}

function getCardNameByValue(val) {
    const rIdx = Math.floor(val / 4);
    const sIdx = val % 4;
    return SUITS[sIdx] + RANKS[rIdx];
}

function getStraightDisplayRankSequence(pattern) {
    if (!pattern || (pattern.type !== 'straight' && pattern.type !== 'straightflush')) return null;
    if (pattern.straightOrder === 9) return [VALUES['A'], VALUES['2'], VALUES['3'], VALUES['4'], VALUES['5']];
    if (pattern.straightOrder === 8) return [VALUES['2'], VALUES['3'], VALUES['4'], VALUES['5'], VALUES['6']];
    if (typeof pattern.straightOrder === 'number' && pattern.straightOrder >= 0 && pattern.straightOrder <= 7) {
        return [pattern.straightOrder, pattern.straightOrder + 1, pattern.straightOrder + 2, pattern.straightOrder + 3, pattern.straightOrder + 4];
    }
    return null;
}

function sortCardsForDisplay(cards, pattern) {
    const arr = [...(cards || [])];
    const straightSeq = getStraightDisplayRankSequence(pattern);
    if (straightSeq) {
        const pos = new Map(straightSeq.map((rank, idx) => [rank, idx]));
        return arr.sort((a, b) => {
            const pa = pos.has(a.rankVal) ? pos.get(a.rankVal) : 99;
            const pb = pos.has(b.rankVal) ? pos.get(b.rankVal) : 99;
            if (pa !== pb) return pa - pb;
            return a.suitIdx - b.suitIdx;
        });
    }
    return arr.sort((a, b) => a.value - b.value);
}

function formatCards(cards) {
    if (!cards || cards.length === 0) return '無';
    return cards.map(c => c.fullName).join(' ');
}

function patternName(pattern) {
    if (!pattern) return '無牌型';
    const names = {
        single: '單張', pair: '對子', triple: '三條', straight: '順子', flush: '同花',
        fullhouse: '葫蘆', fourkind: '鐵支', straightflush: '同花順'
    };
    return names[pattern.type] || pattern.type;
}

function calibrateScoreForLog(rawScore) {
    // 只校正 log 顯示；不能拿來排序或決策。
    if (!Number.isFinite(rawScore)) return 0;
    if (rawScore >= 99999) return 999.0;
    if (rawScore <= -99999) return -999.0;

    const sign = rawScore < 0 ? -1 : 1;
    const x = Math.abs(rawScore);
    let y;

    if (x <= 100) {
        y = x;
    } else if (x <= 600) {
        y = 100 + Math.log1p(x - 100) * 25.8;
    } else if (x <= 2000) {
        y = 260 + Math.log1p(x - 600) * 35.5;
    } else {
        y = 520 + Math.log1p(x - 2000) * 52.0;
    }

    return sign * Math.min(999, y);
}

function buildWinSummary() {
    if (!testStats || testStats.length === 0) return '尚無結果';
    return testStats.map((wins, idx) => `${PLAYER_NAMES[idx]} ${wins || 0}`).join(' / ');
}

function buildWinRateSummary() {
    if (!testBatchPlayed || !testStats || testStats.length === 0) return '尚無結果';
    return testStats
        .map((wins, idx) => `${PLAYER_NAMES[idx]} ${((wins || 0) / testBatchPlayed * 100).toFixed(1)}%`)
        .join(' / ');
}


function buildScoreLeaderboardSummary() {
    if (!testScoreStats || testScoreStats.length === 0) return '尚無結果';
    return testScoreStats.map((score, idx) => `${PLAYER_NAMES[idx]} ${score}`).join(' / ');
}

function buildScoreRankSummary() {
    if (!testScoreStats || testScoreStats.length === 0) return '尚無結果';
    return testScoreStats
        .map((score, idx) => ({ score, idx }))
        .sort((a, b) => b.score - a.score)
        .map((x, pos) => `${pos + 1}. ${PLAYER_NAMES[x.idx]} ${x.score}`)
        .join(' / ');
}

function buildBadLossSummary() {
    if (!testBadLossCounts || testBadLossCounts.length === 0) return '尚無結果';
    return testBadLossCounts.map((n, idx) => `${PLAYER_NAMES[idx]} ${n || 0}`).join(' / ');
}

function buildOneCardLossSummary() {
    if (!testOneCardLossCounts || testOneCardLossCounts.length === 0) return '尚無結果';
    return testOneCardLossCounts.map((n, idx) => `${PLAYER_NAMES[idx]} ${n || 0}`).join(' / ');
}

function buildAverageTurnSummary() {
    if (!testBatchPlayed) return '尚無結果';
    return (testTotalTurns / testBatchPlayed).toFixed(1);
}

function buildAverageRemainingSummary() {
    if (!testBatchPlayed || !testTotalRemaining.length) return '尚無結果';
    return testTotalRemaining
        .map((sum, idx) => `${PLAYER_NAMES[idx]} ${(sum / testBatchPlayed).toFixed(2)}`)
        .join(' / ');
}

function buildMaxLossSummary() {
    if (!testMaxLoserRemaining || testMaxLoserRemaining.playerIdx < 0) return '尚無結果';
    return `第 ${testMaxLoserRemaining.gameNo} 局｜${PLAYER_NAMES[testMaxLoserRemaining.playerIdx]} 剩 ${testMaxLoserRemaining.count} 張`;
}

function buildTestLogText(compact) {
    const header = [
        'AI 測試結果 v10-Hybrid-Rollout（v9E-EndSolver + 關鍵局抽樣 rollout / 固定seed）',
        `完成局數：${testBatchPlayed}/${testBatchTarget}`,
        `玩家數：${numPlayers}`,
        `規則：三條單獨出牌 = ${testAllowTriples ? '允許' : '不允許'}`,
        `計分規則：剩牌每張 -1；剩 9 張以上 x2；每張老 2 再 x2；贏家取得三家扣分總和`,
        `AI版本：${buildAIVersionSummary()}`,
        `分數顯示：AI分數已校正；raw=未校正決策分數；你使用 ${getAIVersionLabel(0)}；v10-Hybrid-Rollout 以 EndSolver 為底，關鍵局面抽樣未知牌做 rollout 重估；固定seed時，同一seed+同一局號會重播同一副牌`,
        `Seed模式：${testFixedSeedEnabled ? '啟用' : '未啟用'}${testFixedSeedEnabled ? `｜seed=${testSeedText}｜baseHash=${testBaseSeed >>> 0}` : ''}`,
        `重播規則：deckSeed = hash(baseHash + 玩家數 + 局號)；AI微隨機使用獨立seed，不會影響發牌序列`,
        `勝場統計：${buildWinSummary()}`,
        `勝率統計：${buildWinRateSummary()}`,
        `積分榜：${buildScoreLeaderboardSummary()}`,
        `積分排名：${buildScoreRankSummary()}`,
        `平均手數：${buildAverageTurnSummary()}`,
        `平均剩牌：${buildAverageRemainingSummary()}`,
        `最大慘敗：${buildMaxLossSummary()}`,
        `慘敗次數（剩牌 ≥ 8）：${buildBadLossSummary()}`,
        `差一手輸局（剩 1 張）：${buildOneCardLossSummary()}`,
        '',
        '=============================='
    ];
    const body = compact ? testLogs.slice(-5) : testLogs;
    if (testCurrentLog.length > 0 && testBatchPlayed < testBatchTarget) body.push(testCurrentLog.join('\n'));
    if (compact && testLogs.length > 5) header.push(`只顯示最近 5 局；按「下載」可輸出完整已記錄內容。`);
    return header.concat(body).join('\n\n');
}

function appendVisibleLog(text) {
    const box = byId('test-log');
    if (!box) return;
    box.value += text;
    box.scrollTop = box.scrollHeight;
}

function copyTestLog() {
    const text = buildTestLogText(false);
    const box = byId('test-log');
    box.value = text;
    box.select();
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).catch(() => document.execCommand('copy'));
    else document.execCommand('copy');
}

function downloadTestLog() {
    const text = buildTestLogText(false);
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `big-two-ai-v10-Hybrid-Rollout-test-${Date.now()}.txt`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
}

function clamp(n, min, max) {
    return Math.max(min, Math.min(max, n));
}

function getErrorMessage(err) {
    if (!err) return String(err);
    return err.message || String(err);
}
